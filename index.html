<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>StandClick 2.0 — Blood Update</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        button { cursor: pointer; outline: none; }
        
        body { 
            background: linear-gradient(135deg, #0a0a1a, #1a0a2e); 
            font-family: 'Segoe UI', 'Poppins', sans-serif; 
            color: white; 
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        /* ========== ЭПИЧНЫЙ ЗАГРУЗОЧНЫЙ ЭКРАН ========== */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, #0a0a2a 0%, #050510 100%);
            z-index: 10000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 1s ease;
        }
        
        .loading-logo {
            text-align: center;
            margin-bottom: 50px;
            animation: floatLogo 2s ease-in-out infinite;
        }
        
        @keyframes floatLogo {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        
        .loading-logo h1 {
            font-size: 64px;
            background: linear-gradient(135deg, #ff4d4d, #ffd700, #ff4d4d);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: gradientShift 3s ease infinite;
            letter-spacing: 5px;
            text-shadow: 0 0 50px rgba(255,77,77,0.5);
        }
        
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        .loading-sub {
            font-size: 14px;
            color: rgba(255,255,255,0.6);
            letter-spacing: 3px;
            margin-top: 10px;
            text-transform: uppercase;
        }
        
        /* Прогресс-бар */
        .loading-bar-container {
            width: 280px;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            overflow: hidden;
            margin: 30px auto;
            box-shadow: 0 0 10px rgba(255,77,77,0.3);
        }
        
        .loading-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #ff4d4d, #ffd700);
            border-radius: 10px;
            transition: width 0.3s ease;
            box-shadow: 0 0 15px #ff4d4d;
        }
        
        .loading-text {
            font-size: 14px;
            color: rgba(255,255,255,0.8);
            margin-top: 10px;
            font-weight: 500;
        }
        
        .loading-tips {
            position: absolute;
            bottom: 40px;
            text-align: center;
            width: 100%;
            font-size: 12px;
            color: rgba(255,255,255,0.4);
            animation: fadeInOut 3s infinite;
        }
        
        @keyframes fadeInOut {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }
        
        /* Парящие частицы на загрузке */
        .loading-particles {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
        }
        
        .particle {
            position: absolute;
            background: rgba(255,77,77,0.6);
            border-radius: 50%;
            animation: particleFloat linear infinite;
        }
        
        @keyframes particleFloat {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% {
                transform: translateY(-100vh) rotate(360deg);
                opacity: 0;
            }
        }
        
        @keyframes flashScreen { 
            0% { box-shadow: inset 0 0 0 0 transparent; } 
            10% { box-shadow: inset 0 0 100px 30px rgba(225,29,72,0.5); } 
            100% { box-shadow: inset 0 0 0 0 transparent; } 
        }
        body.mega-flash { animation: flashScreen 0.7s ease-out; }

        #maintenanceScreen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 9998; align-items: center; justify-content: center; flex-direction: column; }
        
        .container { max-width: 1000px; margin: 0 auto; padding: 20px; text-align: center; }
        
        .nav { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 30px; }
        .nav-btn { background: rgba(30,41,59,0.8); border: none; padding: 8px 16px; border-radius: 20px; color: #aaa; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .nav-btn.active { background: #ff4d4d; color: white; }
        .page { display: none; animation: fadeIn 0.3s; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .gold { font-size: 42px; font-weight: bold; color: #ffd700; margin: 10px 0; text-shadow: 0 0 15px rgba(255,215,0,0.5); }
        .nick { font-size: 18px; color: #aaa; margin: 5px 0; }
        
        .click-area { display: flex; justify-content: center; gap: 20px; margin: 20px 0; }
        .click-btn { width: 150px; height: 150px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, #ff4d4d, #cc0000); border: none; color: white; font-size: 20px; font-weight: bold; cursor: pointer; box-shadow: 0 0 25px rgba(255,77,77,0.4); transition: 0.05s linear; }
        .click-btn:active { transform: scale(0.95); }
        .mega-click-btn { width: 80px; height: 80px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, #e11d48, #9f1239); border: none; color: white; font-weight: bold; cursor: pointer; }
        .mega-click-btn:disabled { opacity: 0.5; }
        .mega-timer { font-size: 11px; color: #aaa; margin-top: 5px; }

        .btn { background: #ff4d4d; border: none; padding: 10px 20px; border-radius: 30px; color: white; font-weight: bold; cursor: pointer; margin: 5px; transition: 0.2s; }
        .btn:hover { transform: scale(1.02); }
        .btn-danger { background: #9f1239; }
        .card { background: rgba(15,23,42,0.8); border-radius: 20px; padding: 15px; margin: 15px auto; border: 1px solid rgba(255,77,77,0.2); max-width: 600px; backdrop-filter: blur(5px); }
        
        .items-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; max-height: 300px; overflow-y: auto; }
        .item-card { background: #1e293b; border-radius: 12px; padding: 10px; text-align: center; cursor: pointer; border-left: 3px solid #ff4d4d; transition: 0.2s; }
        .item-card:hover { transform: translateY(-3px); background: #2d3a4e; }
        
        .id-box { background: rgba(0,0,0,0.4); border-radius: 14px; padding: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #ff4d4d; margin-top: 10px; }
        #playerIdDisplay { font-size: 12px; color: #ff4d4d; font-family: monospace; }
        
        .promo-banner { background: linear-gradient(135deg, #f59e0b, #ef4444); border-radius: 16px; padding: 15px; margin: 15px 0; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; animation: promoGlow 2s infinite; cursor: pointer; transition: 0.2s; }
        .promo-banner:hover { transform: scale(1.02); }
        @keyframes promoGlow { 0%,100% { box-shadow: 0 0 0 0 rgba(245,158,11,0.5); } 50% { box-shadow: 0 0 0 10px rgba(245,158,11,0); } }
        .promo-banner button { background: white; color: #ef4444; border: none; padding: 10px 20px; border-radius: 30px; font-weight: bold; cursor: pointer; }
        
        .cases-grid { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; }
        .case-card { flex: 1; min-width: 250px; background: #1e293b; border-radius: 20px; padding: 20px; text-align: center; transition: 0.2s; cursor: pointer; border: 1px solid rgba(255,77,77,0.3); }
        .case-card:hover { transform: translateY(-5px); border-color: #ff4d4d; }
        .case-price { color: #ffd700; font-weight: bold; font-size: 20px; margin: 10px 0; }
        
        .chances-table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 13px; }
        .chances-table th, .chances-table td { padding: 8px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .chances-table th { color: #ffd700; }
        .rarity-badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 10px; font-weight: bold; }
        .rarity-common { background: #3b82f6; }
        .rarity-rare { background: #a855f7; }
        .rarity-epic { background: #ec4899; }
        .rarity-legendary { background: #f97316; }
        .rarity-arcane { background: #ef4444; }
        
        .preview-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; align-items: center; justify-content: center; flex-direction: column; }
        .preview-canvas { width: 90%; max-width: 500px; height: 400px; background: #0a0a1a; border-radius: 20px; border: 2px solid #ff4d4d; }
        
        .weapon-card { background: #1e293b; border-radius: 12px; padding: 10px; margin: 5px 0; border-left: 3px solid #ff4d4d; }
        
        @media (max-width: 600px) {
            .click-btn { width: 120px; height: 120px; font-size: 16px; }
            .gold { font-size: 32px; }
        }
    </style>
</head>
<body>

<!-- ЭПИЧНЫЙ ЗАГРУЗОЧНЫЙ ЭКРАН -->
<div class="loading-screen" id="loadingScreen">
    <div class="loading-particles" id="loadingParticles"></div>
    <div class="loading-logo">
        <h1>STANDCLICK</h1>
        <div class="loading-sub">BLOOD UPDATE</div>
    </div>
    <div class="loading-bar-container">
        <div class="loading-bar" id="loadingBar"></div>
    </div>
    <div class="loading-text" id="loadingText">ЗАГРУЗКА... 0%</div>
    <div class="loading-tips" id="loadingTip">💡 Открывай кейсы и получай легендарные скины!</div>
</div>

<div id="maintenanceScreen">
    <h2>🔧 ТЕХНИЧЕСКИЕ РАБОТЫ</h2>
</div>

<div class="container" id="mainContainer" style="display:none;">
    
    <div class="nav">
        <button class="nav-btn active" data-page="main">🏠 Главная</button>
        <button class="nav-btn" data-page="inventory">🎒 Инвентарь</button>
        <button class="nav-btn" data-page="cases">🎁 Кейсы</button>
        <button class="nav-btn" data-page="stats">📊 Статы</button>
    </div>

    <div id="page-main" class="page active">
        <div style="background: #1a1a2e; border-radius: 20px; padding: 20px; margin-bottom: 20px;">
            <div class="nick" id="nick" style="font-size: 24px;">Игрок</div>
            <div class="nick" id="rank">🏅 Новичок</div>
        </div>
        
        <div class="online-counter" id="onlineCounter">🟢 Подключение...</div>
        <div class="gold" id="gold">💰 0 G</div>
        <div id="autoBonus" style="font-size:12px;color:#ffaa00;">Авто: 0 G/сек</div>
        
        <div id="promoContainer"></div>
        
        <div class="click-area">
            <button class="click-btn" id="clickBtn">🔫 КЛИК</button>
            <div>
                <button class="mega-click-btn" id="megaClickBtn">MEGA<br>+1000G</button>
                <div class="mega-timer" id="megaTimer">00:00:00</div>
            </div>
        </div>

        <div class="card">
            <div class="id-box">
                <span>ID:</span>
                <span id="playerIdDisplay">—</span>
                <button class="btn" style="padding:5px 12px;" onclick="copyPlayerId()">КОП.</button>
            </div>
            <button class="btn" id="changeNickBtn">Сменить ник</button>
            <button class="btn btn-danger" id="resetBtn">Сброс</button>
        </div>
    </div>

    <div id="page-inventory" class="page">
        <div class="card">
            <h3>🎒 ИНВЕНТАРЬ</h3>
            <div id="skinsList" class="items-grid"></div>
            <hr style="margin: 15px 0;">
            <h4>⚔️ ОРУЖИЕ</h4>
            <div id="weaponsList"></div>
        </div>
    </div>

    <div id="page-cases" class="page">
        <div class="cases-grid" id="casesGrid"></div>
        <div class="card" style="margin-top: 20px;">
            <h3>📊 ШАНСЫ ВЫПАДЕНИЯ</h3>
            <table class="chances-table" id="chancesTable"></table>
        </div>
    </div>

    <div id="page-stats" class="page">
        <div class="card">
            <h3>📊 СТАТИСТИКА</h3>
            <div id="statsContent"></div>
        </div>
    </div>
</div>

<div id="previewModal" class="preview-modal">
    <h2 class="preview-title" id="previewTitle" style="color:#ffd700;">Осмотр</h2>
    <canvas id="previewCanvas" class="preview-canvas"></canvas>
    <button class="btn" style="margin-top: 20px;" onclick="closePreview()">ЗАКРЫТЬ</button>
</div>

<div id="rouletteModal" style="display:none; position:fixed; top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95); z-index:1000; align-items:center; justify-content:center; flex-direction:column;">
    <h2 style="color:#ff4d4d;">Открытие кейса</h2>
    <div style="width:90%; max-width:600px; height:120px; background:#1e293b; border:2px solid #ff4d4d; border-radius:10px; overflow:hidden;">
        <div id="rouletteContainer" style="display:flex; height:100%; width:max-content; transition:transform 5s cubic-bezier(0.1,0,0.1,1);"></div>
    </div>
    <div id="rouletteResult" style="display:none; margin-top:20px;">
        <h3 id="rouletteItemName"></h3>
        <button class="btn" id="rouletteOkBtn" onclick="closeRoulette()">ОК</button>
    </div>
</div>

<script>
    const gun = Gun(['https://gun-vue.yogg.app/gun', 'https://dletta.pub/gun', 'https://peer.wallie.io/gun']);
    
    let game = {
        id: null, nick: "Игрок", gold: 1000, mmr: 0, wins: 0,
        skins: [], usedPromos: [], lastMegaClick: 0,
        weapons: {
            ak47: { name: "AK-47", active: true, skin: null },
            awp: { name: "AWP", active: false, skin: null },
            m4a4: { name: "M4A4", active: false, skin: null }
        }
    };
    
    const BUILTIN_PROMOS = {
        "W_OR_L":   { gold: 500,  skin: null, desc: "🔥 Приветственный бонус!" },
    };
    
    const rarityColors = {
        common: "#3b82f6", rare: "#a855f7", epic: "#ec4899",
        legendary: "#f97316", arcane: "#ef4444", mythic: "#06b6d4"
    };
    
    const CASES = {
        common: {
            name: "📦 Обычный кейс", price: 500, icon: "📦",
            items: [
                { name: "G22 Frost", rarity: "common", chance: 40 },
                { name: "MP5 Swarm", rarity: "common", chance: 35 },
                { name: "SSG 08 Abyss", rarity: "common", chance: 20 },
                { name: "Перчатки (Синие)", rarity: "rare", chance: 5 }
            ]
        },
        rare: {
            name: "✨ Редкий кейс", price: 1500, icon: "✨",
            items: [
                { name: "AKM Tiger", rarity: "rare", chance: 45 },
                { name: "Desert Eagle Cobra", rarity: "rare", chance: 30 },
                { name: "M4A4 Griffin", rarity: "epic", chance: 15 },
                { name: "Перчатки (Красные)", rarity: "legendary", chance: 8 },
                { name: "Karambit Gold", rarity: "arcane", chance: 2 }
            ]
        },
        legendary: {
            name: "🔥 Легендарный кейс", price: 5000, icon: "🔥",
            items: [
                { name: "AWP Dragon Lore", rarity: "legendary", chance: 40 },
                { name: "M9 Bayonet", rarity: "legendary", chance: 25 },
                { name: "Butterfly Fade", rarity: "arcane", chance: 15 },
                { name: "Перчатки (Оранжевые)", rarity: "arcane", chance: 12 },
                { name: "Karambit Ruby", rarity: "arcane", chance: 5 },
                { name: "AWP Medusa", rarity: "mythic", chance: 3 }
            ]
        }
    };
    
    // ========== ЗАГРУЗОЧНЫЙ ЭКРАН ==========
    function createParticles() {
        const container = document.getElementById('loadingParticles');
        for (let i = 0; i < 50; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            const size = Math.random() * 4 + 2;
            particle.style.width = size + 'px';
            particle.style.height = size + 'px';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDuration = Math.random() * 5 + 3 + 's';
            particle.style.animationDelay = Math.random() * 5 + 's';
            particle.style.opacity = Math.random() * 0.5 + 0.2;
            container.appendChild(particle);
        }
    }
    
    const tips = [
        "💡 Открывай кейсы и получай легендарные скины!",
        "⚡ MEGA-клик даёт 1000 G раз в 5 часов!",
        "🎨 Скины увеличивают авто-доход!",
        "🔥 Легендарные скины выпадают с шансом 2-8%",
        "💰 Кликай быстрее — зарабатывай больше!",
        "🎁 Промокоды активируются на главном экране!"
        "🤝 Поддерживай разработчиков игры!"
        "📎 Нашёл баг? Сообщи в боте"
    ];
    
    let currentTip = 0;
    function rotateTips() {
        const tipEl = document.getElementById('loadingTip');
        if (tipEl) {
            currentTip = (currentTip + 1) % tips.length;
            tipEl.style.opacity = '0';
            setTimeout(() => {
                tipEl.textContent = tips[currentTip];
                tipEl.style.opacity = '1';
            }, 500);
        }
    }
    setInterval(rotateTips, 4000);
    
    async function startLoading() {
        createParticles();
        const loadingBar = document.getElementById('loadingBar');
        const loadingText = document.getElementById('loadingText');
        const steps = [
            { progress: 10, text: "Инициализация ядра...", delay: 200 },
            { progress: 25, text: "Загрузка базы данных Gun...", delay: 300 },
            { progress: 40, text: "Подключение к серверу...", delay: 250 },
            { progress: 55, text: "Загрузка профиля игрока...", delay: 200 },
            { progress: 70, text: "Синхронизация инвентаря...", delay: 250 },
            { progress: 85, text: "Загрузка кейсов и скинов...", delay: 200 },
            { progress: 95, text: "Почти готово...", delay: 200 },
            { progress: 100, text: "Вход в игру...", delay: 300 }
        ];
        
        for (const step of steps) {
            await new Promise(resolve => setTimeout(resolve, step.delay));
            loadingBar.style.width = step.progress + '%';
            loadingText.textContent = step.text + ' ' + step.progress + '%';
        }
        
        await new Promise(resolve => setTimeout(resolve, 500));
        document.getElementById('loadingScreen').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('loadingScreen').style.display = 'none';
            document.getElementById('mainContainer').style.display = 'block';
            initGameUI();
        }, 1000);
    }
    
    function initGameUI() {
        renderCases();
        renderChances();
        updateUI();
        loadGameData();
    }
    
    function renderCases() {
        const grid = document.getElementById('casesGrid');
        if (!grid) return;
        grid.innerHTML = Object.entries(CASES).map(([id, data]) => `
            <div class="case-card" onclick="openCaseType('${id}')">
                <div class="case-icon" style="font-size:48px;">${data.icon}</div>
                <h3>${data.name}</h3>
                <div class="case-price">💰 ${data.price} G</div>
                <button class="btn" style="margin-top: 10px;">Открыть</button>
            </div>
        `).join('');
    }
    
    function renderChances() {
        const table = document.getElementById('chancesTable');
        if (!table) return;
        let html = `<table><th>Предмет</th><th>Редкость</th><th>Шанс</th><th>Превью</th></tr>`;
        for (const [caseId, caseData] of Object.entries(CASES)) {
            html += `<tr style="background: rgba(255,77,77,0.1);"><td colspan="4" style="color: #ffd700; font-weight: bold;">${caseData.name}</td></tr>`;
            for (const item of caseData.items) {
                html += `<tr><td>${item.name}</td><td><span class="rarity-badge rarity-${item.rarity}">${item.rarity}</span></td><td>${item.chance}%</td><td><button class="btn" style="padding: 4px 12px;" onclick="showPreview('${item.name}', '${item.rarity}')">🔍 Превью</button></td></tr>`;
            }
        }
        table.innerHTML = html;
    }
    
    function openCaseType(caseId) {
        const caseData = CASES[caseId];
        if (!caseData) return;
        if (game.gold < caseData.price) { showToast(`❌ Нужно ${caseData.price} G`); return; }
        game.gold -= caseData.price;
        saveGameData();
        updateUI();
        
        const random = Math.random() * 100;
        let accumulated = 0;
        let selectedItem = null;
        for (const item of caseData.items) {
            accumulated += item.chance;
            if (random <= accumulated) { selectedItem = item; break; }
        }
        if (!selectedItem) selectedItem = caseData.items[0];
        showRoulette(selectedItem, caseData.items);
    }
    
    function showRoulette(winItem, allItems) {
        const winIndex = 40;
        let spinItems = [];
        for (let i = 0; i < 50; i++) {
            if (i === winIndex) spinItems.push(winItem);
            else spinItems.push(allItems[Math.floor(Math.random() * allItems.length)]);
        }
        const container = document.getElementById('rouletteContainer');
        container.innerHTML = spinItems.map(item => `<div style="width:120px; display:flex; flex-direction:column; align-items:center; justify-content:center;"><div style="font-size:36px;">${item.name.includes("Перчатки") ? "🧤" : "🔫"}</div><div style="font-size:10px; color:${rarityColors[item.rarity]}">${item.name}</div></div>`).join('');
        const modal = document.getElementById('rouletteModal');
        modal.style.display = 'flex';
        setTimeout(() => container.style.transform = `translateX(${-(winIndex * 120 + 100)}px)`, 50);
        window.pendingWinItem = winItem;
    }
    
    function closeRoulette() {
        const winItem = window.pendingWinItem;
        if (winItem) {
            game.skins.push({ name: winItem.name, rarity: winItem.rarity });
            saveGameData();
            updateUI();
            showToast(`🎉 Выпало: ${winItem.name}! 🎉`);
            showPreview(winItem.name, winItem.rarity);
            window.pendingWinItem = null;
        }
        document.getElementById('rouletteModal').style.display = 'none';
        document.getElementById('rouletteResult').style.display = 'none';
        const container = document.getElementById('rouletteContainer');
        if (container) container.style.transform = '';
    }
    
    // 3D Превью
    let previewScene, previewCamera, previewRenderer, previewModel;
    
    function showPreview(itemName, rarity) {
        const modal = document.getElementById('previewModal');
        document.getElementById('previewTitle').innerHTML = `🔍 ${itemName} <span style="color:${rarityColors[rarity]}">(${rarity})</span>`;
        modal.style.display = 'flex';
        const canvas = document.getElementById('previewCanvas');
        const w = canvas.clientWidth, h = canvas.clientHeight;
        if (!previewRenderer) {
            previewRenderer = new THREE.WebGLRenderer({ canvas: canvas, alpha: true });
            previewScene = new THREE.Scene();
            previewCamera = new THREE.PerspectiveCamera(45, w/h, 0.1, 100);
            previewCamera.position.set(0, 0, 5);
            const light = new THREE.DirectionalLight(0xffffff, 1);
            light.position.set(2, 3, 4);
            previewScene.add(light);
            previewScene.add(new THREE.AmbientLight(0x404060));
        }
        previewRenderer.setSize(w, h);
        previewCamera.aspect = w/h;
        previewCamera.updateProjectionMatrix();
        if (previewModel) previewScene.remove(previewModel);
        const color = rarityColors[rarity] || "#ff4d4d";
        const material = new THREE.MeshStandardMaterial({ color: color, metalness: 0.7, roughness: 0.3, emissive: color, emissiveIntensity: 0.2 });
        if (itemName.includes("Перчатки")) {
            const group = new THREE.Group();
            group.add(new THREE.Mesh(new THREE.BoxGeometry(1, 0.8, 0.5), material));
            previewModel = group;
        } else if (itemName.includes("Karambit") || itemName.includes("Bayonet") || itemName.includes("Butterfly")) {
            const group = new THREE.Group();
            const blade = new THREE.Mesh(new THREE.ConeGeometry(0.3, 1.2, 8), material);
            blade.rotation.x = 0.5;
            blade.position.y = 0.6;
            group.add(blade, new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.6, 0.2), new THREE.MeshStandardMaterial({ color: 0x8B4513 })));
            previewModel = group;
        } else {
            previewModel = new THREE.Mesh(new THREE.BoxGeometry(1.5, 0.3, 0.2), material);
        }
        previewScene.add(previewModel);
        function animate() { requestAnimationFrame(animate); if (previewModel) previewModel.rotation.y += 0.01; previewRenderer.render(previewScene, previewCamera); }
        animate();
    }
    
    function closePreview() {
        document.getElementById('previewModal').style.display = 'none';
        if (previewModel) previewScene.remove(previewModel);
    }
    
    // Основные функции игры
    function generateId() { return 'ST2-' + Math.random().toString(36).substring(2, 10).toUpperCase(); }
    
    function showToast(msg) {
        const t = document.createElement('div');
        t.textContent = msg;
        t.style.cssText = `position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#ff4d4d;color:#fff;font-weight:bold;padding:12px 24px;border-radius:30px;z-index:9999;animation:fadeOut 2s ease;white-space:nowrap;`;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 2000);
    }
    
    function getRankName() {
        if (game.mmr < 100) return "Новичок";
        if (game.mmr < 300) return "Боец";
        if (game.mmr < 600) return "Ветеран";
        return "Легенда";
    }
    
    function getAutoGain() {
        const weapon = Object.values(game.weapons).find(w => w.active);
        if (!weapon || !weapon.skin) return 0;
        const r = weapon.skin.rarity;
        if (r === 'common') return 1;
        if (r === 'rare') return 2;
        if (r === 'epic') return 4;
        if (r === 'legendary') return 8;
        if (r === 'arcane') return 15;
        return 0;
    }
    
    function saveGameData() {
        if (!game.id) return;
        localStorage.setItem('sc_game_' + game.id, JSON.stringify(game));
        localStorage.setItem('sc_last_id', game.id);
        gun.get('p_' + game.id).put({ id: game.id, nick: game.nick, gold: game.gold, mmr: game.mmr, wins: game.wins, lastSeen: Date.now() });
    }
    
    function loadGameData() {
        const savedId = localStorage.getItem('sc_last_id');
        if (savedId) {
            const raw = localStorage.getItem('sc_game_' + savedId);
            if (raw) {
                try {
                    const d = JSON.parse(raw);
                    game.id = d.id || savedId;
                    game.nick = d.nick || "Игрок";
                    game.gold = d.gold ?? 1000;
                    game.mmr = d.mmr ?? 0;
                    game.wins = d.wins ?? 0;
                    game.skins = d.skins || [];
                    game.usedPromos = d.usedPromos || [];
                    game.lastMegaClick = d.lastMegaClick || 0;
                    if (d.weapons) Object.assign(game.weapons, d.weapons);
                } catch(e) {}
            }
        }
        if (!game.id) { game.id = generateId(); saveGameData(); }
        if (game.skins.length === 0) {
            game.skins.push({ name: "Перчатки (Синие)", rarity: "rare" });
            saveGameData();
        }
        updateUI();
        updateMegaTimer();
        renderPromos();
    }
    
    function updateUI() {
        document.getElementById('gold').innerHTML = `💰 ${Math.floor(game.gold)} G`;
        document.getElementById('nick').innerHTML = game.nick;
        document.getElementById('rank').innerHTML = `🏅 ${getRankName()} (${game.mmr} MMR)`;
        if (game.id) document.getElementById('playerIdDisplay').innerText = game.id;
        document.getElementById('autoBonus').innerHTML = `🤖 Авто: ${getAutoGain()} G/сек`;
        
        const skinsDiv = document.getElementById('skinsList');
        if (skinsDiv) {
            skinsDiv.innerHTML = game.skins.map((s, i) => `
                <div class="item-card" onclick="equipSkin(${i})">
                    <div style="font-size:28px;">${s.name.includes("Перчатки") ? "🧤" : "🔫"}</div>
                    <div>${s.name}</div>
                    <div style="font-size:10px; color:${rarityColors[s.rarity]}">${s.rarity}</div>
                </div>
            `).join('');
        }
        
        const weaponsDiv = document.getElementById('weaponsList');
        if (weaponsDiv) {
            weaponsDiv.innerHTML = Object.entries(game.weapons).map(([id, w]) => `
                <div class="weapon-card">
                    <b>${w.name}</b> ${w.active ? '✅' : ''}
                    <div>Скин: ${w.skin ? w.skin.name : 'нет'}</div>
                    ${!w.active ? `<button class="btn" style="padding:4px 12px;" onclick="equipWeapon('${id}')">Надеть</button>` : ''}
                    ${w.skin ? `<button class="btn" style="padding:4px 12px; background:#10b981;" onclick="showPreview('${w.skin.name}', '${w.skin.rarity}')">Превью</button>` : ''}
                </div>
            `).join('');
        }
    }
    
    function equipWeapon(weaponId) {
        for (let id in game.weapons) game.weapons[id].active = (id === weaponId);
        saveGameData();
        updateUI();
        showToast(`🔫 ${game.weapons[weaponId].name} экипирован`);
    }
    
    function equipSkin(index) {
        const skin = game.skins[index];
        if (!skin) return;
        if (skin.name.includes("Перчатки")) {
            showToast(`🧤 ${skin.name} надеты!`);
        } else {
            const active = Object.entries(game.weapons).find(([,w]) => w.active);
            if (active) {
                game.weapons[active[0]].skin = skin;
                saveGameData();
                updateUI();
                showToast(`🎨 ${skin.name} надет на ${active[1].name}`);
            }
        }
    }
    
    function renderPromos() {
        const container = document.getElementById('promoContainer');
        if (!container) return;
        const available = [];
        for (const [code, data] of Object.entries(BUILTIN_PROMOS)) {
            if (!game.usedPromos.includes(code)) available.push({ code, ...data });
        }
        if (available.length === 0) { container.innerHTML = '<div class="card">✅ Все промокоды активированы!</div>'; return; }
        container.innerHTML = available.map(p => `
            <div class="promo-banner" onclick="claimPromo('${p.code}')">
                <span>🎁 ${p.desc}</span>
                <button onclick="event.stopPropagation(); claimPromo('${p.code}')">ЗАБРАТЬ +${p.gold}G</button>
            </div>
        `).join('');
    }
    
    window.claimPromo = function(code) {
        if (game.usedPromos.includes(code)) { showToast("Уже активирован!"); return; }
        const promo = BUILTIN_PROMOS[code];
        game.gold += promo.gold;
        if (promo.skin) game.skins.push({ name: promo.skin, rarity: "legendary" });
        game.usedPromos.push(code);
        saveGameData();
        updateUI();
        renderPromos();
        showToast(`✅ +${promo.gold} G!`);
        document.body.classList.add('mega-flash');
        setTimeout(() => document.body.classList.remove('mega-flash'), 700);
    };
    
    document.getElementById('clickBtn').onclick = () => { game.gold += 2; saveGameData(); updateUI(); };
    
    function updateMegaTimer() {
        const cooldown = 5 * 60 * 60 * 1000;
        const passed = Date.now() - (game.lastMegaClick || 0);
        const btn = document.getElementById('megaClickBtn');
        const timer = document.getElementById('megaTimer');
        if (passed >= cooldown) { btn.disabled = false; timer.innerText = "ГОТОВО"; }
        else {
            btn.disabled = true;
            const left = cooldown - passed;
            const h = Math.floor(left / 3600000);
            const m = Math.floor((left % 3600000) / 60000);
            const s = Math.floor((left % 60000) / 1000);
            timer.innerText = `${h}:${m<10?'0'+m:m}:${s<10?'0'+s:s}`;
        }
    }
    setInterval(updateMegaTimer, 1000);
    
    document.getElementById('megaClickBtn').onclick = () => {
        if (Date.now() - (game.lastMegaClick || 0) >= 5 * 60 * 60 * 1000) {
            game.gold += 1000;
            game.lastMegaClick = Date.now();
            saveGameData();
            updateUI();
            updateMegaTimer();
            document.body.classList.add('mega-flash');
            setTimeout(() => document.body.classList.remove('mega-flash'), 700);
        }
    };
    
    setInterval(() => { const auto = getAutoGain(); if (auto > 0) { game.gold += auto; saveGameData(); updateUI(); } }, 1000);
    
    function copyPlayerId() { if (game.id) navigator.clipboard.writeText(game.id); showToast("ID скопирован!"); }
    
    document.getElementById('changeNickBtn').onclick = () => {
        const newNick = prompt("Новый ник:", game.nick);
        if (newNick?.trim()) { game.nick = newNick.trim().substring(0, 20); saveGameData(); updateUI(); showToast(`Ник изменён`); }
    };
    
    document.getElementById('resetBtn').onclick = () => {
        if (confirm("Сбросить прогресс?")) { localStorage.clear(); location.reload(); }
    };
    
    document.querySelectorAll('.nav-btn').forEach(btn => {
        btn.onclick = () => {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(`page-${btn.dataset.page}`).classList.add('active');
            if (btn.dataset.page === 'cases') { renderCases(); renderChances(); }
            if (btn.dataset.page === 'stats') {
                const stats = game.skins.reduce((acc, s) => { acc[s.rarity] = (acc[s.rarity] || 0) + 1; return acc; }, {});
                document.getElementById('statsContent').innerHTML = `
                    <div>🪙 Голда: ${Math.floor(game.gold)} G</div>
                    <div>📈 MMR: ${game.mmr}</div>
                    <div>🏆 Побед: ${game.wins}</div>
                    <div>🎒 Скинов: ${game.skins.length}</div>
                    <div>💻 Промокодов: ${game.usedPromos.length}/${Object.keys(BUILTIN_PROMOS).length}</div>
                    <hr><h4>Редкости скинов:</h4>
                    ${Object.entries(stats).map(([r,c]) => `<div style="color:${rarityColors[r]}">${r}: ${c} шт.</div>`).join('')}
                `;
            }
        };
    });
    
    gun.get('server_maintenance').on(data => { document.getElementById('maintenanceScreen').style.display = data?.active ? 'flex' : 'none'; });
    
    // ЗАПУСК
    startLoading();
    
    window.openCaseType = openCaseType;
    window.closeRoulette = closeRoulette;
    window.showPreview = showPreview;
    window.closePreview = closePreview;
    window.equipWeapon = equipWeapon;
    window.equipSkin = equipSkin;
    window.copyPlayerId = copyPlayerId;
    window.claimPromo = claimPromo;
    
    const styleEl = document.createElement('style');
    styleEl.textContent = `@keyframes fadeOut { 0% { opacity: 1; } 70% { opacity: 1; } 100% { opacity: 0; } }`;
    document.head.appendChild(styleEl);
</script>
</body>
