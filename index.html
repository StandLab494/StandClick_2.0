<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>StandClick 3D — Оружие и скины</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { background: linear-gradient(135deg, #0a0a0c 0%, #0f0f1a 100%); font-family: 'Segoe UI', 'Inter', system-ui, sans-serif; color: white; min-height: 100vh; padding: 20px; overflow-x: hidden; }
        body::before { content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 20% 50%, rgba(255,77,77,0.08) 0%, transparent 50%), radial-gradient(circle at 80% 80%, rgba(155,89,182,0.08) 0%, transparent 50%); pointer-events: none; z-index: 0; animation: bgPulse 8s ease-in-out infinite; }
        @keyframes bgPulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
        .container { max-width: 500px; margin: 0 auto; text-align: center; position: relative; z-index: 1; }
        .canvas-container { background: rgba(0,0,0,0.3); border-radius: 24px; padding: 10px; margin-bottom: 15px; border: 1px solid rgba(255,77,77,0.3); }
        #heroCanvas { width: 100%; height: 350px; display: block; border-radius: 16px; }
        .gold { font-size: 48px; font-weight: bold; color: #ffcc00; text-shadow: 0 0 15px rgba(255,204,0,0.5); margin: 10px 0; }
        .nick { font-size: 18px; color: #aaa; margin: 5px 0; }
        .online-counter { background: rgba(0,0,0,0.6); border-radius: 30px; padding: 6px 16px; display: inline-block; margin-bottom: 15px; font-size: 13px; font-weight: bold; backdrop-filter: blur(5px); }
        .click-btn { width: 180px; height: 180px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, #ff4d4d, #cc0000); border: 6px solid #ffcc00; margin: 20px auto; display: block; color: #ffcc00; font-size: 28px; font-weight: bold; cursor: pointer; box-shadow: 0 0 25px rgba(255,68,68,0.4); transition: transform 0.05s; }
        .click-btn:active { transform: scale(0.96); }
        .btn { background: #ff4d4d; color: #fff; border: none; padding: 10px 20px; border-radius: 30px; font-weight: bold; cursor: pointer; margin: 5px; transition: 0.1s; }
        .btn:active { transform: scale(0.97); }
        .btn-danger { background: #9f1239; color: white; }
        .btn-weapon { background: #3b82f6; padding: 8px 15px; font-size: 14px; }
        .btn-skin { background: #8b5cf6; padding: 6px 12px; font-size: 12px; }
        .card { background: rgba(15, 23, 42, 0.7); border-radius: 20px; padding: 15px; margin: 15px 0; backdrop-filter: blur(10px); border: 1px solid rgba(255,77,77,0.2); }
        .weapon-panel { display: flex; gap: 10px; justify-content: center; margin-bottom: 15px; flex-wrap: wrap; }
        .skin-info { background: #1e293b; border-radius: 12px; padding: 10px; margin-top: 10px; }
        .id-box { background: rgba(0,0,0,0.4); border-radius: 14px; padding: 10px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; gap: 8px; border: 1px solid #ff4d4d; }
        .chat-container { position: fixed; bottom: 20px; right: 20px; width: 300px; background: #1a1a22; border-radius: 16px; border: 1px solid #ff4d4d; z-index: 1000; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 5px 20px rgba(0,0,0,0.5); backdrop-filter: blur(10px); }
        .chat-header { background: #ff4d4d; color: #fff; padding: 10px 14px; font-weight: bold; display: flex; justify-content: space-between; cursor: pointer; }
        .chat-messages { height: 280px; overflow-y: auto; padding: 10px; font-size: 12px; background: #0f0f14; }
        .chat-input-area { display: flex; padding: 10px; gap: 8px; background: #252530; }
        .chat-input-area input { flex: 1; padding: 10px; border-radius: 20px; border: none; background: #1a1a22; color: white; }
        .chat-input-area button { background: #ff4d4d; border: none; border-radius: 20px; padding: 8px 16px; cursor: pointer; font-weight: bold; color: white; }
        .message { margin: 6px 0; word-break: break-word; }
        .message-user { color: #ff4d4d; font-weight: bold; }
        .message-bot { color: #00ffaa; font-weight: bold; }
        .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: #10b981; padding: 8px 20px; border-radius: 30px; font-size: 13px; animation: fadeOut 2s ease; z-index: 2000; }
        @keyframes fadeOut { 0% { opacity: 1; } 70% { opacity: 1; } 100% { opacity: 0; visibility: hidden; } }
        .inspect-btn { background: #f59e0b; color: #1a1a2e; font-weight: bold; margin-top: 10px; }
        .edit-face-btn { width: 100%; padding: 12px; background: rgba(0,0,0,0.5); border: none; border-top: 1px solid rgba(255,77,77,0.3); color: #ff4d4d; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="canvas-container">
        <canvas id="heroCanvas"></canvas>
        <input type="file" id="faceUpload" accept="image/*" style="display:none">
        <button class="edit-face-btn" onclick="document.getElementById('faceUpload').click()">📷 Редактировать лицо</button>
    </div>

    <div class="online-counter" id="onlineCounter">🟢 Подключение...</div>
    <div class="gold" id="gold">0 G</div>
    <div class="nick" id="nick">Игрок</div>
    <div class="nick" id="rank">Silver I</div>
    
    <button class="click-btn" id="clickBtn">CLICK</button>

    <!-- ОРУЖИЕ И СКИНЫ -->
    <div class="card">
        <h3>🔫 ОРУЖИЕ</h3>
        <div class="weapon-panel">
            <button class="btn btn-weapon" data-weapon="0">🗡️ Меч</button>
            <button class="btn btn-weapon" data-weapon="1">🪓 Топор</button>
            <button class="btn btn-weapon" data-weapon="2">🏹 Лук</button>
        </div>
        <div class="weapon-panel">
            <button class="btn btn-skin" id="prevSkinBtn">◀ Пред. скин</button>
            <button class="btn btn-skin" id="nextSkinBtn">След. скин ▶</button>
        </div>
        <div class="skin-info" id="skinInfo">🎨 Текущий скин: Обычный</div>
        <button class="btn inspect-btn" id="inspectBtn">🔍 ОСМОТР (анимация)</button>
    </div>

    <div class="card">
        <div class="id-box">
            <span>🆔 ID:</span>
            <span id="playerId">—</span>
            <button class="btn" style="padding:5px 12px;margin:0;" onclick="copyPlayerId()">📋</button>
        </div>
        <button class="btn" id="changeNickBtn">✏️ Сменить ник</button>
        <button class="btn btn-danger" id="resetBtn">🔄 Сброс</button>
    </div>

    <div class="card">
        <h3>🎁 КЕЙСЫ</h3>
        <button class="btn" id="openCommonCase">📦 Обычный (500 G)</button>
        <button class="btn" id="openRareCase">🔥 Редкий (1500 G)</button>
        <button class="btn" id="openLegendaryCase">💎 Легендарный (5000 G)</button>
    </div>

    <div class="card">
        <h3>🎨 ИНВЕНТАРЬ (скины оружия)</h3>
        <div id="inventory" style="display: flex; flex-wrap: wrap; gap: 8px; justify-content: center;"></div>
    </div>
</div>

<div class="chat-container" id="chatContainer">
    <div class="chat-header"><span>💬 ЧАТ</span><span id="chatClose" style="cursor:pointer;">✖</span></div>
    <div class="chat-messages" id="chatMessages"><div class="message"><span class="message-bot">🟢 Система</span>: Добро пожаловать!</div></div>
    <div class="chat-input-area"><input type="text" id="chatInput" placeholder="Написать..."><button id="chatSendBtn">➤</button></div>
</div>

<script>
    // ========== 3D СЦЕНА ==========
    let scene, camera, renderer, character, faceMesh;
    let targetRotation = 0, currentRotation = 0;
    
    // ОРУЖИЕ И СКИНЫ
    let currentWeapon = 0; // 0-меч, 1-топор, 2-лук
    let currentSkinIndex = 0;
    let weaponGroup = null;
    let isInspecting = false;
    let inspectTime = 0;
    let originalWeaponPos = { x: 0, y: 0, z: 0 };
    let originalWeaponRot = { x: 0, y: 0, z: 0 };
    
    // Данные оружия и скинов
    const weapons = [
        { name: "Меч", baseColor: 0x88aaff, metalColor: 0xcceeff },
        { name: "Топор", baseColor: 0xaa8866, metalColor: 0xccaa88 },
        { name: "Лук", baseColor: 0x88aa66, metalColor: 0xaacc88 }
    ];
    
    const skins = [
        { name: "⚔️ Обычный", color: 0x88aaff, emissive: 0x000000 },
        { name: "🔥 Пламенный", color: 0xff6644, emissive: 0x442200 },
        { name: "❄️ Ледяной", color: 0x44aaff, emissive: 0x002244 },
        { name: "💜 Фиолетовый", color: 0xaa44ff, emissive: 0x220044 },
        { name: "⭐ Золотой", color: 0xffcc44, emissive: 0x442200 }
    ];
    
    function init3D() {
        const canvas = document.getElementById('heroCanvas');
        const w = canvas.clientWidth, h = canvas.clientHeight;
        
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(45, w / h, 0.1, 100);
        camera.position.set(0, 1.8, 5.5);
        camera.lookAt(0, 1.2, 0);
        
        renderer = new THREE.WebGLRenderer({ canvas: canvas, alpha: true, antialias: true });
        renderer.setSize(w, h);
        renderer.setClearColor(0x000000, 0);
        
        // Свет
        const ambientLight = new THREE.AmbientLight(0x404040);
        scene.add(ambientLight);
        const mainLight = new THREE.DirectionalLight(0xffffff, 1);
        mainLight.position.set(3, 5, 4);
        scene.add(mainLight);
        const backLight = new THREE.DirectionalLight(0x88aaff, 0.5);
        backLight.position.set(-2, 2, -3);
        scene.add(backLight);
        const fillLight = new THREE.PointLight(0xffaa88, 0.3);
        fillLight.position.set(1, 2, 2);
        scene.add(fillLight);
        
        // Персонаж
        character = new THREE.Group();
        
        // Тело
        const torsoMat = new THREE.MeshStandardMaterial({ color: 0x3b82f6, roughness: 0.4 });
        const body = new THREE.Mesh(new THREE.CylinderGeometry(0.6, 0.5, 1.2, 16), torsoMat);
        body.position.y = 0;
        character.add(body);
        
        // Голова
        const headMat = new THREE.MeshStandardMaterial({ color: 0xf5cba0, roughness: 0.2 });
        const head = new THREE.Mesh(new THREE.SphereGeometry(0.5, 32, 32), headMat);
        head.position.y = 1;
        character.add(head);
        
        // Лицо
        faceMesh = new THREE.Mesh(new THREE.PlaneGeometry(0.8, 0.8), new THREE.MeshBasicMaterial({ transparent: true, opacity: 0 }));
        faceMesh.position.set(0, 1, 0.51);
        character.add(faceMesh);
        
        // Руки
        const armMat = new THREE.MeshStandardMaterial({ color: 0xf5cba0 });
        const leftArm = new THREE.Mesh(new THREE.CylinderGeometry(0.18, 0.15, 0.9, 8), armMat);
        leftArm.position.set(-0.8, 0.6, 0);
        leftArm.rotation.z = 0.3;
        character.add(leftArm);
        
        const rightArm = new THREE.Mesh(new THREE.CylinderGeometry(0.18, 0.15, 0.9, 8), armMat);
        rightArm.position.set(0.8, 0.6, 0);
        rightArm.rotation.z = -0.3;
        character.add(rightArm);
        
        // Ноги
        const legMat = new THREE.MeshStandardMaterial({ color: 0x2c3e50 });
        const leftLeg = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.18, 0.9, 8), legMat);
        leftLeg.position.set(-0.35, -0.7, 0);
        character.add(leftLeg);
        
        const rightLeg = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.18, 0.9, 8), legMat);
        rightLeg.position.set(0.35, -0.7, 0);
        character.add(rightLeg);
        
        scene.add(character);
        
        // СОЗДАЁМ ОРУЖИЕ В РУКЕ
        createWeapon();
        
        // Загрузка лица
        const savedFace = localStorage.getItem('sc_custom_face');
        if (savedFace) applyFaceTexture(savedFace);
        
        // Анимация
        let time = 0;
        function animate() {
            requestAnimationFrame(animate);
            time += 0.016;
            
            // Дыхание
            character.position.y = Math.sin(time * 1.5) * 0.005;
            
            // АНИМАЦИЯ ОСМОТРА
            if (isInspecting) {
                if (weaponGroup) {
                    // Поднимаем оружие к лицу и крутим
                    const progress = Math.min(1, inspectTime / 1.5);
                    const easeOut = 1 - Math.pow(1 - progress, 3);
                    
                    if (inspectTime < 1.5) {
                        // Подъём и вращение
                        weaponGroup.position.x = originalWeaponPos.x + Math.sin(inspectTime * 12) * 0.15 * (1 - easeOut);
                        weaponGroup.position.y = originalWeaponPos.y + 0.4 * easeOut;
                        weaponGroup.position.z = originalWeaponPos.z + 0.3 * easeOut;
                        weaponGroup.rotation.x = originalWeaponRot.x + Math.sin(inspectTime * 15) * 0.5 * (1 - easeOut);
                        weaponGroup.rotation.y = originalWeaponRot.y + inspectTime * 3;
                        weaponGroup.rotation.z = originalWeaponRot.z + Math.sin(inspectTime * 10) * 0.3;
                        inspectTime += 0.03;
                    } else {
                        // Возврат
                        const backProgress = Math.min(1, (inspectTime - 1.5) / 0.5);
                        const easeBack = backProgress;
                        weaponGroup.position.x = originalWeaponPos.x + (0 - (originalWeaponPos.x + 0.15)) * easeBack;
                        weaponGroup.position.y = originalWeaponPos.y + (originalWeaponPos.y - (originalWeaponPos.y + 0.4)) * easeBack;
                        weaponGroup.position.z = originalWeaponPos.z + (originalWeaponPos.z - (originalWeaponPos.z + 0.3)) * easeBack;
                        weaponGroup.rotation.x = originalWeaponRot.x + (originalWeaponRot.x - (originalWeaponRot.x + 0.5)) * easeBack;
                        weaponGroup.rotation.y = originalWeaponRot.y + (originalWeaponRot.y - (originalWeaponRot.y + 4.5)) * easeBack;
                        weaponGroup.rotation.z = originalWeaponRot.z + (originalWeaponRot.z - (originalWeaponRot.z + 0.3)) * easeBack;
                        inspectTime += 0.03;
                        if (inspectTime >= 2.0) {
                            isInspecting = false;
                            weaponGroup.position.copy(originalWeaponPos);
                            weaponGroup.rotation.set(originalWeaponRot.x, originalWeaponRot.y, originalWeaponRot.z);
                        }
                    }
                }
            }
            
            // Поворот персонажа
            currentRotation += (targetRotation - currentRotation) * 0.1;
            character.rotation.y = currentRotation;
            
            renderer.render(scene, camera);
        }
        animate();
        
        // Мышь для вращения
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX - rect.left) / rect.width;
            targetRotation = (x - 0.5) * 1.8;
        });
        canvas.addEventListener('touchmove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = (e.touches[0].clientX - rect.left) / rect.width;
            targetRotation = (x - 0.5) * 1.8;
        });
        
        window.addEventListener('resize', () => {
            const w = canvas.clientWidth, h = canvas.clientHeight;
            renderer.setSize(w, h);
            camera.aspect = w / h;
            camera.updateProjectionMatrix();
        });
    }
    
    function createWeapon() {
        if (weaponGroup) scene.remove(weaponGroup);
        
        weaponGroup = new THREE.Group();
        const skin = skins[currentSkinIndex];
        const material = new THREE.MeshStandardMaterial({ color: skin.color, emissive: skin.emissive, roughness: 0.3, metalness: 0.7 });
        
        if (currentWeapon === 0) { // МЕЧ
            const blade = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.8, 0.08), material);
            blade.position.y = 0.4;
            weaponGroup.add(blade);
            const handle = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.25, 0.1), new THREE.MeshStandardMaterial({ color: 0x8B4513 }));
            handle.position.y = 0;
            weaponGroup.add(handle);
            const guard = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.08, 0.15), new THREE.MeshStandardMaterial({ color: 0xccaa66, metalness: 0.8 }));
            guard.position.y = 0.15;
            weaponGroup.add(guard);
        } 
        else if (currentWeapon === 1) { // ТОПОР
            const axeHead = new THREE.Mesh(new THREE.BoxGeometry(0.35, 0.35, 0.08), material);
            axeHead.position.y = 0.4;
            weaponGroup.add(axeHead);
            const handle = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.1, 0.55, 8), new THREE.MeshStandardMaterial({ color: 0x8B4513 }));
            handle.position.y = 0.1;
            weaponGroup.add(handle);
        } 
        else { // ЛУК
            const bowCurve = new THREE.Mesh(new THREE.TorusGeometry(0.35, 0.07, 16, 32, Math.PI), material);
            bowCurve.rotation.x = Math.PI / 2;
            bowCurve.rotation.z = 0.5;
            weaponGroup.add(bowCurve);
            const string = new THREE.Mesh(new THREE.BoxGeometry(0.03, 0.6, 0.02), new THREE.MeshStandardMaterial({ color: 0xccaa88 }));
            string.position.z = 0.15;
            weaponGroup.add(string);
        }
        
        // Позиция в правой руке персонажа
        weaponGroup.position.set(0.8, 0.5, 0.4);
        weaponGroup.rotation.set(0.2, 0.3, 0.1);
        
        originalWeaponPos = { x: weaponGroup.position.x, y: weaponGroup.position.y, z: weaponGroup.position.z };
        originalWeaponRot = { x: weaponGroup.rotation.x, y: weaponGroup.rotation.y, z: weaponGroup.rotation.z };
        
        scene.add(weaponGroup);
    }
    
    function switchWeapon(weaponIndex) {
        currentWeapon = weaponIndex;
        applySkinToWeapon();
        updateSkinInfo();
        showToast(`🔫 Экипировано: ${weapons[currentWeapon].name}`);
    }
    
    function nextSkin() {
        currentSkinIndex = (currentSkinIndex + 1) % skins.length;
        applySkinToWeapon();
        updateSkinInfo();
        showToast(`🎨 Скин изменён: ${skins[currentSkinIndex].name}`);
    }
    
    function prevSkin() {
        currentSkinIndex = (currentSkinIndex - 1 + skins.length) % skins.length;
        applySkinToWeapon();
        updateSkinInfo();
        showToast(`🎨 Скин изменён: ${skins[currentSkinIndex].name}`);
    }
    
    function applySkinToWeapon() {
        if (weaponGroup) {
            const skin = skins[currentSkinIndex];
            weaponGroup.children.forEach(child => {
                if (child.material && child !== weaponGroup.children.find(c => c.material?.color?.getHex() === 0x8B4513)) {
                    child.material.color.setHex(skin.color);
                    if (child.material.emissive) child.material.emissive.setHex(skin.emissive);
                }
            });
        }
        // Сохраняем выбранный скин для оружия
        saveSkinToInventory();
    }
    
    function saveSkinToInventory() {
        const skinName = skins[currentSkinIndex].name;
        if (!game.skins.includes(`${weapons[currentWeapon].name}: ${skinName}`)) {
            game.skins.push(`${weapons[currentWeapon].name}: ${skinName}`);
            saveGame();
            updateUI();
        }
    }
    
    function updateSkinInfo() {
        document.getElementById('skinInfo').innerHTML = `🎨 ${weapons[currentWeapon].name} — ${skins[currentSkinIndex].name}`;
    }
    
    function startInspect() {
        if (isInspecting) return;
        isInspecting = true;
        inspectTime = 0;
        
        if (weaponGroup) {
            originalWeaponPos = { x: weaponGroup.position.x, y: weaponGroup.position.y, z: weaponGroup.position.z };
            originalWeaponRot = { x: weaponGroup.rotation.x, y: weaponGroup.rotation.y, z: weaponGroup.rotation.z };
        }
        showToast("🔍 Осмотр оружия...");
    }
    
    function applyFaceTexture(base64) {
        const img = new Image();
        img.onload = () => {
            const canvas = document.createElement('canvas');
            canvas.width = 256; canvas.height = 256;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, 256, 256);
            const texture = new THREE.CanvasTexture(canvas);
            faceMesh.material = new THREE.MeshBasicMaterial({ map: texture, transparent: true });
        };
        img.src = base64;
    }
    
    document.getElementById('faceUpload').addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
            localStorage.setItem('sc_custom_face', ev.target.result);
            applyFaceTexture(ev.target.result);
            showToast("✅ Лицо обновлено!");
        };
        reader.readAsDataURL(file);
    });
    
    // ========== ОНЛАЙН ==========
    let onlineCount = 12;
    const botNames = ["KILLER_228", "Xx_Standoff_xX", "NoobMaster69", "PRO100_SNIPER", "Creeper_1337", "M4A4_King", "AWP_God", "Ghost_Rusher", "Dimasik_Pro", "Messi_10", "Zloy_Shadow", "Legendary_Peak"];
    const botMessages = ["харош", "кто в пати?", "дайте нож", "кейс открыл", "лвл какой?", "гоню на миде", "суета", "фармим дальше", "хай всем"];
    
    function updateOnlineCounter() {
        onlineCount = Math.max(5, Math.min(99, onlineCount + (Math.floor(Math.random() * 9) - 4)));
        document.getElementById('onlineCounter').innerHTML = `🟢 ${onlineCount} игроков онлайн`;
    }
    setInterval(updateOnlineCounter, 12000);
    updateOnlineCounter();
    
    // ========== ЧАТ ==========
    function addChatMessage(name, text, isUser = false) {
        const container = document.getElementById('chatMessages');
        const msg = document.createElement('div');
        msg.className = 'message';
        msg.innerHTML = isUser ? `<span class="message-user">${name}:</span> ${text}` : `<span class="message-bot">🤖 ${name}:</span> ${text}`;
        container.appendChild(msg);
        container.scrollTop = container.scrollHeight;
        while (container.children.length > 100) container.removeChild(container.firstChild);
    }
    
    function botSendMessage() {
        const randomBot = botNames[Math.floor(Math.random() * botNames.length)];
        const randomMsg = botMessages[Math.floor(Math.random() * botMessages.length)];
        addChatMessage(randomBot, randomMsg);
    }
    setInterval(botSendMessage, 25000);
    setTimeout(botSendMessage, 3000);
    
    // ========== ОСНОВНАЯ ЛОГИКА ==========
    let game = { id: null, nick: "Игрок", gold: 1000, mmr: 0, wins: 0, skins: [] };
    
    const commonSkins = ["Обычный меч", "Деревянный топор", "Простой лук"];
    const rareSkins = ["Стальной клинок", "Боевой топор", "Длинный лук"];
    const legendarySkins = ["Драконий меч", "Топор титана", "Лук арбалета"];
    
    function generateId() { return 'ST2-' + Math.random().toString(36).substring(2, 10).toUpperCase(); }
    function getRankName() { return game.mmr >= 5000 ? "Global Elite" : game.mmr >= 3000 ? "Legendary Eagle" : game.mmr >= 1500 ? "Master Guardian" : game.mmr >= 500 ? "Gold Nova" : "Silver I"; }
    function getSkinBonus() { return Math.min(5 + game.skins.length, 30); }
    
    function saveGame() { localStorage.setItem('standclick_3d', JSON.stringify({ id: game.id, nick: game.nick, gold: game.gold, mmr: game.mmr, wins: game.wins, skins: game.skins })); }
    
    function loadGame() {
        const saved = localStorage.getItem('standclick_3d');
        if (saved) { try { const d = JSON.parse(saved); game.id = d.id; game.nick = d.nick || "Игрок"; game.gold = d.gold ?? 1000; game.mmr = d.mmr ?? 0; game.wins = d.wins ?? 0; game.skins = d.skins || []; } catch(e) {} }
        if (!game.id) { game.id = generateId(); saveGame(); }
        updateUI();
    }
    
    function updateUI() {
        document.getElementById('gold').innerText = Math.floor(game.gold) + " G";
        document.getElementById('nick').innerText = game.nick;
        document.getElementById('playerId').innerText = game.id;
        document.getElementById('rank').innerHTML = getRankName();
        
        const invContainer = document.getElementById('inventory');
        if (game.skins.length === 0) invContainer.innerHTML = '<div style="color:#666;">Нет скинов</div>';
        else invContainer.innerHTML = game.skins.map(s => `<div style="background:#1e293b;padding:8px 12px;border-radius:12px;border-left:3px solid #ff4d4d;">🎨 ${s}</div>`).join('');
    }
    
    function openCase(price, skinsList, caseName) {
        if (game.gold < price) { showToast(`❌ Нужно ${price} G`); return; }
        game.gold -= price;
        const randomSkin = skinsList[Math.floor(Math.random() * skinsList.length)];
        game.skins.push(randomSkin);
        saveGame(); updateUI();
        showToast(`🎁 ${caseName} | Выпало: ${randomSkin}!`);
    }
    
    function showToast(msg) {
        const toast = document.createElement('div'); toast.className = 'toast'; toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }
    
    function copyPlayerId() { navigator.clipboard.writeText(game.id); showToast("🆔 ID скопирован!"); }
    
    // СОБЫТИЯ
    document.getElementById('clickBtn').onclick = () => {
        let gain = 2 + Math.floor(Math.random() * 3);
        gain += Math.floor(gain * getSkinBonus() / 100);
        game.gold += gain;
        saveGame(); updateUI();
        showToast(`💰 +${gain} G`);
    };
    
    document.getElementById('openCommonCase').onclick = () => openCase(500, commonSkins, "📦 Обычный кейс");
    document.getElementById('openRareCase').onclick = () => openCase(1500, rareSkins, "🔥 Редкий кейс");
    document.getElementById('openLegendaryCase').onclick = () => openCase(5000, legendarySkins, "💎 Легендарный кейс");
    document.getElementById('changeNickBtn').onclick = () => { const newNick = prompt("Новый ник:", game.nick); if (newNick?.trim()) { game.nick = newNick.trim(); saveGame(); updateUI(); showToast(`✅ Ник изменён на ${game.nick}`); } };
    document.getElementById('resetBtn').onclick = () => { if (confirm("Сбросить весь прогресс?")) { localStorage.removeItem('standclick_3d'); location.reload(); } };
    
    // Оружие и скины
    document.querySelectorAll('[data-weapon]').forEach(btn => {
        btn.addEventListener('click', () => switchWeapon(parseInt(btn.dataset.weapon)));
    });
    document.getElementById('nextSkinBtn').onclick = () => nextSkin();
    document.getElementById('prevSkinBtn').onclick = () => prevSkin();
    document.getElementById('inspectBtn').onclick = () => startInspect();
    
    // Чат
    function sendChatMessage() {
        const input = document.getElementById('chatInput');
        const text = input.value.trim();
        if (!text) return;
        addChatMessage(game.nick, text, true);
        input.value = '';
    }
    document.getElementById('chatSendBtn').onclick = sendChatMessage;
    document.getElementById('chatInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') sendChatMessage(); });
    document.getElementById('chatClose').onclick = () => { document.getElementById('chatContainer').style.display = 'none'; };
    
    // Запуск
    setTimeout(() => init3D(), 100);
    loadGame();
    setInterval(() => saveGame(), 30000);
</script>
</body>
    </html>
