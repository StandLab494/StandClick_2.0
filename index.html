<meta name='viewport' content='width=device-width, initial-scale=1'/><!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>StandClick — 3D Кликер</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body {
            background: linear-gradient(135deg, #0a0a0c, #0f0f1a);
            font-family: 'Segoe UI', system-ui, sans-serif;
            color: white;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 500px; margin: 0 auto; text-align: center; }
        
        /* 3D блок */
        .canvas-container {
            background: radial-gradient(circle, rgba(255,77,77,0.1), transparent);
            border-radius: 20px;
            border: 1px solid rgba(255,77,77,0.3);
            padding: 10px;
            margin-bottom: 15px;
        }
        #heroCanvas {
            width: 100%;
            height: 300px;
            display: block;
            border-radius: 16px;
        }
        
        .gold { font-size: 48px; font-weight: bold; color: #ffcc00; margin: 10px 0; }
        .nick { font-size: 18px; color: #aaa; margin: 5px 0; }
        .click-btn {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            background: radial-gradient(#444, #111);
            border: 6px solid #ffcc00;
            margin: 20px auto;
            display: block;
            color: #ffcc00;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }
        .click-btn:active { transform: scale(0.96); }
        .btn {
            background: #ffcc00;
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            margin: 5px;
        }
        .card {
            background: rgba(15,23,42,0.7);
            border-radius: 20px;
            padding: 15px;
            margin: 15px 0;
        }
        .id-box {
            background: rgba(0,0,0,0.4);
            border-radius: 14px;
            padding: 10px;
            margin-top: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }
        .promo-input {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        .promo-input input {
            flex: 1;
            background: #1e293b;
            border: 1px solid #ffcc00;
            padding: 10px;
            border-radius: 30px;
            color: white;
            text-align: center;
        }
        .nav {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .nav-btn {
            background: #1e293b;
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 14px;
        }
        .nav-btn.active {
            background: #ffcc00;
            color: #000;
        }
        .page { display: none; }
        .page.active { display: block; }
        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 10px;
            max-height: 300px;
            overflow-y: auto;
        }
        .item-card {
            background: #1e293b;
            border-radius: 12px;
            padding: 8px;
            text-align: center;
            cursor: pointer;
            border-left: 3px solid #ffcc00;
        }
        .match-log {
            background: #000;
            color: #0f0;
            font-family: monospace;
            padding: 10px;
            border-radius: 10px;
            height: 80px;
            overflow-y: auto;
            font-size: 11px;
            text-align: left;
            margin-top: 10px;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #10b981;
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 13px;
            animation: fadeOut 2s ease;
            z-index: 1000;
        }
        @keyframes fadeOut {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="nav">
        <button class="nav-btn active" data-page="main">🎯 Главная</button>
        <button class="nav-btn" data-page="match">⚔️ Матчи</button>
        <button class="nav-btn" data-page="shop">🎁 Кейсы</button>
        <button class="nav-btn" data-page="inventory">📦 Инвентарь</button>
        <button class="nav-btn" data-page="promo">🔑 Промокоды</button>
    </div>

    <!-- Главная страница с 3D -->
    <div id="page-main" class="page active">
        <div class="canvas-container">
            <canvas id="heroCanvas"></canvas>
        </div>
        <div class="gold" id="gold">0 G</div>
        <div class="nick" id="nick">Игрок</div>
        <div class="nick" id="rank">Silver I</div>
        <button class="click-btn" id="clickBtn">CLICK</button>
        <div class="id-box">
            <span>🆔 ID:</span>
            <span id="playerIdDisplay">—</span>
            <button class="btn" style="padding:5px 12px;margin:0;font-size:12px;" onclick="copyPlayerId()">📋</button>
        </div>
        <div style="margin-top:10px;">
            <button class="btn" id="changeNickBtn">✏️ Сменить ник</button>
            <button class="btn btn-danger" id="resetBtn" style="background:#dc2626;">🔄 Сброс</button>
        </div>
    </div>

    <!-- Матчи -->
    <div id="page-match" class="page">
        <div class="card">
            <button class="btn" id="findMatchBtn">🔍 НАЙТИ МАТЧ</button>
            <div class="match-log" id="matchLog">> Ожидание...</div>
        </div>
        <div class="card">
            <div>🏆 Побед: <span id="wins">0</span></div>
            <div>📊 MMR: <span id="mmr">0</span></div>
        </div>
    </div>

    <!-- Кейсы -->
    <div id="page-shop" class="page">
        <div class="card"><h3>📦 Обычный кейс</h3><p>500 G</p><button class="btn" id="openCommonCase">Открыть</button></div>
        <div class="card"><h3>🔥 Редкий кейс</h3><p>1500 G</p><button class="btn" id="openRareCase">Открыть</button></div>
        <div class="card"><h3>💎 Легендарный кейс</h3><p>5000 G</p><button class="btn" id="openLegendaryCase">Открыть</button></div>
    </div>

    <!-- Инвентарь -->
    <div id="page-inventory" class="page">
        <div class="card"><h3>🎨 МОИ СКИНЫ</h3><div id="skinsList" class="items-grid"></div></div>
    </div>

    <!-- Промокоды -->
    <div id="page-promo" class="page">
        <div class="card">
            <h3>🔑 Промокод</h3>
            <div class="promo-input">
                <input type="text" id="promoCodeInput" placeholder="Введите промокод">
                <button class="btn" id="activatePromoBtn">Активировать</button>
            </div>
        </div>
    </div>
</div>

<script>
    // ========== GUN ==========
    const gun = Gun(['https://gun-vue.yogg.app/gun', 'https://dletta.pub/gun']);
    const db = gun.get('standclick_v2');
    const promosDb = gun.get('standclick_promos');

    // ========== ДАННЫЕ ==========
    const SAVE_KEY = 'standclick_player';
    
    let game = {
        id: null,
        nick: "Игрок",
        gold: 1000,
        mmr: 0,
        wins: 0,
        skins: [],
        usedPromos: [],
        equippedGlove: null,
        equippedClothing: null
    };

    const commonSkins = ["G22 Frost", "MP5 Swarm", "SSG 08 Abyss"];
    const rareSkins = ["AKM Tiger", "Desert Eagle Cobra", "M4A4 Griffin"];
    const legendarySkins = ["AWP Dragon Lore", "Karambit Fade", "M9 Bayonet"];

    // ========== ГЕНЕРАЦИЯ ID ==========
    function generateId() { return 'ST2-' + Math.random().toString(36).substring(2, 10).toUpperCase(); }

    // ========== СОХРАНЕНИЕ ==========
    function saveGame() {
        if (!game.id) return;
        const saveData = {
            id: game.id, nick: game.nick, gold: game.gold,
            mmr: game.mmr, wins: game.wins, skins: game.skins,
            usedPromos: game.usedPromos,
            equippedGlove: game.equippedGlove,
            equippedClothing: game.equippedClothing
        };
        localStorage.setItem(SAVE_KEY, JSON.stringify(saveData));
        const indicator = document.getElementById('saveIndicator');
        if (indicator) { indicator.style.opacity = '1'; setTimeout(() => indicator.style.opacity = '0', 1500); }
    }

    function loadGame() {
        const saved = localStorage.getItem(SAVE_KEY);
        if (saved) {
            try {
                const data = JSON.parse(saved);
                game.id = data.id; game.nick = data.nick || "Игрок";
                game.gold = data.gold ?? 1000; game.mmr = data.mmr ?? 0;
                game.wins = data.wins ?? 0; game.skins = data.skins || [];
                game.usedPromos = data.usedPromos || [];
                game.equippedGlove = data.equippedGlove || null;
                game.equippedClothing = data.equippedClothing || null;
            } catch(e) {}
        }
        if (!game.id) {
            game.id = generateId();
            saveGame();
        }
        updateUI();
        applyClothingToModel();
        applyGlovesToModel();
    }

    // ========== РАНГ ==========
    function getRankName() {
        if (game.mmr >= 5000) return "Global Elite";
        if (game.mmr >= 3000) return "Legendary Eagle";
        if (game.mmr >= 1500) return "Master Guardian";
        if (game.mmr >= 500) return "Gold Nova";
        return "Silver I";
    }

    // ========== UI ==========
    function updateUI() {
        document.getElementById('gold').innerText = Math.floor(game.gold) + " G";
        document.getElementById('nick').innerText = game.nick;
        document.getElementById('wins').innerText = game.wins;
        document.getElementById('mmr').innerText = game.mmr;
        document.getElementById('rank').innerHTML = getRankName();
        document.getElementById('playerIdDisplay').innerText = game.id;
        document.getElementById('skinsList').innerHTML = game.skins.map((s, i) => `<div class="item-card"><div>🎨 ${s}</div></div>`).join('');
    }

    // ========== ПРОМОКОДЫ ==========
    async function activatePromo() {
        const code = document.getElementById('promoCodeInput').value.trim().toUpperCase();
        if (!code) { showToast("❌ Введите код"); return; }
        if (game.usedPromos.includes(code)) { showToast("❌ Вы уже использовали этот промокод!"); return; }
        promosDb.get(code).once((data) => {
            if (!data || data.usesLeft <= 0) { showToast("❌ Неверный промокод!"); return; }
            data.usesLeft--; promosDb.get(code).put(data);
            game.usedPromos.push(code);
            game.gold += data.gold;
            if (data.skin) game.skins.push(data.skin);
            saveGame(); updateUI();
            showToast(`✅ +${data.gold} G!`);
            document.getElementById('promoCodeInput').value = '';
        });
    }

    // ========== КЕЙСЫ ==========
    function openCase(price, skins, caseName) {
        if (game.gold < price) { showToast(`❌ Нужно ${price} G`); return; }
        game.gold -= price;
        const randomSkin = skins[Math.floor(Math.random() * skins.length)];
        game.skins.push(randomSkin);
        saveGame(); updateUI();
        showToast(`🎁 ${caseName} | Выпало: ${randomSkin}!`);
    }

    // ========== МАТЧ ==========
    function startMatch() {
        const win = Math.random() > 0.48;
        const mmrChange = Math.floor(Math.random() * 15) + 5;
        if (win) { game.mmr += mmrChange; game.wins++; showToast(`🏆 ПОБЕДА! +${mmrChange} MMR`); }
        else { game.mmr = Math.max(0, game.mmr - mmrChange); showToast(`💔 ПОРАЖЕНИЕ! -${mmrChange} MMR`); }
        saveGame(); updateUI();
    }

    // ========== 3D ПЕРСОНАЖ ==========
    let heroChar, mainScene, mainCamera, mainRenderer, mainReq;
    let isLookingAtGloves = false;
    let gloveLookTimer = 0;

    function create3DCharacter() {
        const group = new THREE.Group();
        const mat = new THREE.MeshStandardMaterial({ color: 0xaaaaaa, roughness: 0.5 });
        const armMat = mat.clone();
        
        // Голова
        const head = new THREE.Mesh(new THREE.SphereGeometry(0.8, 32, 32), mat);
        head.position.y = 1.2;
        group.add(head);
        
        // Тело
        const torso = new THREE.Mesh(new THREE.CylinderGeometry(0.7, 0.6, 1.5, 32), mat);
        torso.position.y = 0;
        group.add(torso);
        
        // Руки
        const armL = new THREE.Mesh(new THREE.CylinderGeometry(0.25, 0.2, 1.2, 16), mat);
        armL.position.set(-0.9, 0.8, 0);
        armL.rotation.z = 0.3;
        group.add(armL);
        
        const armR = new THREE.Mesh(new THREE.CylinderGeometry(0.25, 0.2, 1.2, 16), mat);
        armR.position.set(0.9, 0.8, 0);
        armR.rotation.z = -0.3;
        group.add(armR);
        
        // Перчатки
        const gloveL = new THREE.Mesh(new THREE.SphereGeometry(0.2, 16, 16), armMat);
        gloveL.position.set(-1.2, 0.3, 0.2);
        group.add(gloveL);
        
        const gloveR = new THREE.Mesh(new THREE.SphereGeometry(0.2, 16, 16), armMat);
        gloveR.position.set(1.2, 0.3, 0.2);
        group.add(gloveR);
        
        // Ноги
        const legL = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.25, 1, 16), mat);
        legL.position.set(-0.4, -0.8, 0);
        group.add(legL);
        
        const legR = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.25, 1, 16), mat);
        legR.position.set(0.4, -0.8, 0);
        group.add(legR);
        
        return { root: group, torso, armL, armR, gloveL, gloveR, armMat };
    }

    function applyGlovesToModel() {
        if (!heroChar || !game.equippedGlove) return;
        const color = game.equippedGlove === "Красные перчатки" ? 0xef4444 : 0x3b82f6;
        heroChar.armMat.color.setHex(color);
    }

    function applyClothingToModel() {
        if (!heroChar || !game.equippedClothing) return;
        if (game.equippedClothing === 1) heroChar.torso.material.color.setHex(0x1e293b);
        else if (game.equippedClothing === 2) heroChar.torso.material.color.setHex(0xf8fafc);
    }

    function initThree() {
        if (mainRenderer) return;
        const canvas = document.getElementById('heroCanvas');
        mainRenderer = new THREE.WebGLRenderer({ canvas: canvas, alpha: true });
        mainRenderer.setSize(canvas.clientWidth, canvas.clientHeight);
        
        mainScene = new THREE.Scene();
        mainCamera = new THREE.PerspectiveCamera(45, canvas.clientWidth / canvas.clientHeight, 0.1, 100);
        mainCamera.position.set(0, 1, 5);
        mainCamera.lookAt(0, 0, 0);
        
        const light = new THREE.DirectionalLight(0xffffff, 1); light.position.set(2, 5, 3); mainScene.add(light);
        const backLight = new THREE.DirectionalLight(0xffffff, 0.5); backLight.position.set(-2, 1, -3); mainScene.add(backLight);
        mainScene.add(new THREE.AmbientLight(0x404040));
        
        heroChar = create3DCharacter();
        heroChar.root.position.y = -0.5;
        mainScene.add(heroChar.root);
        
        applyGlovesToModel();
        applyClothingToModel();
        
        let time = 0;
        function animate() {
            mainReq = requestAnimationFrame(animate);
            time += 0.02;
            
            // Анимация дыхания
            heroChar.root.position.y = -0.5 + Math.sin(time) * 0.02;
            heroChar.armL.rotation.z = 0.3 + Math.sin(time * 1.5) * 0.05;
            heroChar.armR.rotation.z = -0.3 + Math.sin(time * 1.5) * 0.05;
            
            mainRenderer.render(mainScene, mainCamera);
        }
        animate();
        
        window.addEventListener('resize', () => {
            const w = canvas.clientWidth, h = canvas.clientHeight;
            mainRenderer.setSize(w, h);
            mainCamera.aspect = w / h;
            mainCamera.updateProjectionMatrix();
        });
    }

    // ========== УТИЛИТЫ ==========
    function showToast(msg) {
        const toast = document.createElement('div'); toast.className = 'toast';
        toast.innerText = msg; document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }
    function copyPlayerId() { navigator.clipboard.writeText(game.id); showToast("🆔 ID скопирован!"); }

    // ========== СОБЫТИЯ ==========
    document.querySelectorAll('.nav-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(`page-${btn.dataset.page}`).classList.add('active');
        });
    });

    document.getElementById('clickBtn').onclick = () => { game.gold++; saveGame(); updateUI(); };
    document.getElementById('findMatchBtn').onclick = () => {
        const btn = document.getElementById('findMatchBtn'), log = document.getElementById('matchLog');
        btn.disabled = true; log.innerHTML = "> Поиск игроков...\n";
        setTimeout(() => { log.innerHTML += "> Матч начался!\n"; setTimeout(() => { startMatch(); btn.disabled = false; log.innerHTML += "> Матч завершён!\n"; }, 2000); }, 1000);
    };
    document.getElementById('openCommonCase').onclick = () => openCase(500, commonSkins, "📦 Обычный кейс");
    document.getElementById('openRareCase').onclick = () => openCase(1500, rareSkins, "🔥 Редкий кейс");
    document.getElementById('openLegendaryCase').onclick = () => openCase(5000, legendarySkins, "💎 Легендарный кейс");
    document.getElementById('changeNickBtn').onclick = () => {
        const newNick = prompt("Новый ник:", game.nick);
        if (newNick && newNick.trim()) { game.nick = newNick.trim(); saveGame(); updateUI(); showToast(`✅ Ник изменён на ${game.nick}`); }
    };
    document.getElementById('resetBtn').onclick = () => {
        if (confirm("Сбросить весь прогресс?")) { localStorage.removeItem(SAVE_KEY); location.reload(); }
    };
    document.getElementById('activatePromoBtn').onclick = activatePromo;

    const indicator = document.createElement('div');
    indicator.id = 'saveIndicator';
    indicator.style.cssText = 'position:fixed; bottom:15px; left:15px; background:#00000080; padding:4px 10px; border-radius:20px; font-size:10px; color:#0f0; opacity:0; transition:0.3s; z-index:999;';
    indicator.innerText = '💾 Сохранено';
    document.body.appendChild(indicator);

    // ========== ЗАПУСК ==========
    loadGame();
    setInterval(() => saveGame(), 30000);
    setTimeout(() => initThree(), 500);
</script>
</body>
</html>
