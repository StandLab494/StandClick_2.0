<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>StandClick 2.0 — Blood Update</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        button { cursor: pointer; outline: none; }
        
        body { background: linear-gradient(135deg, #0a0a1a, #1a0a2e); font-family: 'Segoe UI', sans-serif; color: white; min-height: 100vh; overflow-x: hidden; }
        
        @keyframes flashScreen { 0% { box-shadow: inset 0 0 0 0 transparent; } 10% { box-shadow: inset 0 0 100px 30px rgba(225,29,72,0.5); } 100% { box-shadow: inset 0 0 0 0 transparent; } }
        body.mega-flash { animation: flashScreen 0.7s ease-out; }

        /* ЭПИЧНАЯ ЗАСТАВКА */
        #introScreen { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: #000000; 
            z-index: 9999; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            flex-direction: column;
            overflow: hidden;
        }
        
        #introCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        
        .intro-content {
            position: relative;
            z-index: 2;
            text-align: center;
            animation: fadeInScale 1.5s ease-out;
        }
        
        @keyframes fadeInScale {
            0% { opacity: 0; transform: scale(0.8); filter: blur(10px); }
            100% { opacity: 1; transform: scale(1); filter: blur(0); }
        }
        
        .intro-title { 
            font-size: 64px; 
            color: #ff4d4d; 
            text-transform: uppercase; 
            letter-spacing: 8px; 
            text-shadow: 0 0 30px #ff4d4d, 0 0 60px #ff0000;
            margin-bottom: 30px;
            font-weight: 900;
        }
        
        .intro-sub {
            font-size: 18px;
            color: rgba(255,255,255,0.7);
            letter-spacing: 4px;
            margin-bottom: 40px;
            text-transform: uppercase;
        }
        
        .intro-btn { 
            padding: 15px 50px; 
            font-size: 20px; 
            font-weight: bold; 
            background: linear-gradient(135deg, #ff4d4d, #cc0000); 
            border: none; 
            border-radius: 50px; 
            cursor: pointer; 
            color: #fff; 
            box-shadow: 0 0 30px rgba(255,77,77,0.8);
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        
        .intro-btn:before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }
        
        .intro-btn:hover:before {
            left: 100%;
        }
        
        .intro-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 40px rgba(255,77,77,1);
        }
        
        @keyframes evaporate { 
            0% { opacity: 1; transform: scale(1); filter: blur(0); } 
            100% { opacity: 0; transform: scale(1.5); filter: blur(20px); } 
        }
        .evaporating { animation: evaporate 1s forwards; pointer-events: none; }

        #maintenanceScreen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 9998; align-items: center; justify-content: center; flex-direction: column; }
        
        .container { max-width: 900px; margin: 0 auto; padding: 20px; text-align: center; }
        
        .nav { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 30px; }
        .nav-btn { background: rgba(30,41,59,0.8); border: none; padding: 8px 16px; border-radius: 20px; color: #aaa; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .nav-btn.active { background: #ff4d4d; color: white; }
        .page { display: none; animation: fadeIn 0.3s; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .gold { font-size: 42px; font-weight: bold; color: #ffd700; margin: 10px 0; text-shadow: 0 0 15px rgba(255,215,0,0.5); }
        .nick { font-size: 18px; color: #aaa; margin: 5px 0; }
        
        .click-area { display: flex; justify-content: center; gap: 20px; margin: 20px 0; }
        .click-btn { width: 150px; height: 150px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, #ff4d4d, #cc0000); border: none; color: white; font-size: 20px; font-weight: bold; cursor: pointer; box-shadow: 0 0 25px rgba(255,77,77,0.4); transition: 0.05s linear; }
        .click-btn:active { transform: scale(0.95); }
        .mega-click-btn { width: 80px; height: 80px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, #e11d48, #9f1239); border: none; color: white; font-weight: bold; cursor: pointer; }
        .mega-click-btn:disabled { opacity: 0.5; }
        .mega-timer { font-size: 11px; color: #aaa; margin-top: 5px; }

        .btn { background: #ff4d4d; border: none; padding: 10px 20px; border-radius: 30px; color: white; font-weight: bold; cursor: pointer; margin: 5px; transition: 0.2s; }
        .btn:hover { transform: scale(1.02); }
        .btn-danger { background: #9f1239; }
        .card { background: rgba(15,23,42,0.8); border-radius: 20px; padding: 15px; margin: 15px auto; border: 1px solid rgba(255,77,77,0.2); max-width: 600px; backdrop-filter: blur(5px); }
        
        .items-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; max-height: 300px; overflow-y: auto; }
        .item-card { background: #1e293b; border-radius: 12px; padding: 10px; text-align: center; cursor: pointer; border-left: 3px solid #ff4d4d; transition: 0.2s; }
        .item-card:hover { transform: translateY(-3px); background: #2d3a4e; }
        
        .id-box { background: rgba(0,0,0,0.4); border-radius: 14px; padding: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #ff4d4d; margin-top: 10px; }
        #playerIdDisplay { font-size: 12px; color: #ff4d4d; font-family: monospace; }
        
        .promo-banner { background: linear-gradient(135deg, #f59e0b, #ef4444); border-radius: 16px; padding: 15px; margin: 15px 0; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; animation: promoGlow 2s infinite; cursor: pointer; transition: 0.2s; }
        .promo-banner:hover { transform: scale(1.02); }
        @keyframes promoGlow { 0%,100% { box-shadow: 0 0 0 0 rgba(245,158,11,0.5); } 50% { box-shadow: 0 0 0 10px rgba(245,158,11,0); } }
        .promo-banner span { font-weight: bold; font-size: 18px; }
        .promo-banner button { background: white; color: #ef4444; border: none; padding: 10px 20px; border-radius: 30px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .promo-banner button:hover { transform: scale(1.05); }
        
        .shop-layout { display: flex; flex-wrap: wrap; gap: 20px; }
        .shop-case { flex: 1; min-width: 200px; background: #1e293b; border-radius: 16px; padding: 15px; text-align: center; transition: 0.2s; cursor: pointer; }
        .shop-case:hover { transform: translateY(-5px); border: 1px solid #ff4d4d; }
        
        .weapon-card { background: #1e293b; border-radius: 12px; padding: 10px; margin: 5px 0; border-left: 3px solid #ff4d4d; }
        
        @media (max-width: 600px) {
            .intro-title { font-size: 36px; letter-spacing: 4px; }
            .click-btn { width: 120px; height: 120px; font-size: 16px; }
            .gold { font-size: 32px; }
            .promo-banner span { font-size: 14px; }
        }
    </style>
</head>
<body>

<!-- ЭПИЧНАЯ ЗАСТАВКА С 3D АНИМАЦИЕЙ -->
<div id="introScreen">
    <canvas id="introCanvas"></canvas>
    <div class="intro-content">
        <h1 class="intro-title">STANDCLICK 2.0</h1>
        <div class="intro-sub">BLOOD UPDATE</div>
        <button class="intro-btn" onclick="startApp()">ВОЙТИ В ИГРУ</button>
    </div>
</div>

<div id="maintenanceScreen">
    <h2>🔧 ТЕХНИЧЕСКИЕ РАБОТЫ</h2>
    <p>Сервер временно недоступен</p>
</div>

<div class="container" id="mainContainer" style="display:none;">
    
    <div class="nav">
        <button class="nav-btn active" data-page="main">🏠 Главная</button>
        <button class="nav-btn" data-page="inventory">🎒 Инвентарь</button>
        <button class="nav-btn" data-page="shop">🎁 Кейсы</button>
        <button class="nav-btn" data-page="stats">📊 Статы</button>
    </div>

    <!-- ГЛАВНАЯ -->
    <div id="page-main" class="page active">
        <div style="background: #1a1a2e; border-radius: 20px; padding: 20px; margin-bottom: 20px;">
            <div style="font-size: 48px; text-align: center;">⚔️</div>
            <div class="nick" id="nick" style="font-size: 24px;">Игрок</div>
            <div class="nick" id="rank">🏅 Новичок</div>
        </div>
        
        <div class="online-counter" id="onlineCounter">🟢 Подключение...</div>
        <div class="gold" id="gold">💰 0 G</div>
        <div id="autoBonus" style="font-size:12px;color:#ffaa00;">Авто: 0 G/сек</div>
        
        <!-- БЛОК С ВСТРОЕННЫМИ ПРОМОКОДАМИ -->
        <div id="promoContainer" style="margin: 10px 0;"></div>
        
        <div class="click-area">
            <button class="click-btn" id="clickBtn">🔫 КЛИК</button>
            <div>
                <button class="mega-click-btn" id="megaClickBtn">MEGA<br>+1000G</button>
                <div class="mega-timer" id="megaTimer">00:00:00</div>
            </div>
        </div>

        <div class="card">
            <div class="id-box">
                <span>ID:</span>
                <span id="playerIdDisplay">—</span>
                <button class="btn" style="padding:5px 12px;" onclick="copyPlayerId()">КОП.</button>
            </div>
            <button class="btn" id="changeNickBtn">Сменить ник</button>
            <button class="btn btn-danger" id="resetBtn">Сброс</button>
        </div>
    </div>

    <!-- ИНВЕНТАРЬ -->
    <div id="page-inventory" class="page">
        <div class="card">
            <h3>🎒 ИНВЕНТАРЬ</h3>
            <div id="skinsList" class="items-grid"></div>
            <hr style="margin: 15px 0;">
            <h4>⚔️ ОРУЖИЕ</h4>
            <div id="weaponsList"></div>
        </div>
    </div>

    <!-- КЕЙСЫ -->
    <div id="page-shop" class="page">
        <div class="shop-layout">
            <div class="shop-case"><h3>📦 Обычный</h3><p>500 G</p><button class="btn" id="openCommonCase">Открыть</button></div>
            <div class="shop-case"><h3>✨ Редкий</h3><p>1500 G</p><button class="btn" id="openRareCase">Открыть</button></div>
            <div class="shop-case"><h3>🔥 Легендарный</h3><p>5000 G</p><button class="btn" id="openLegendaryCase">Открыть</button></div>
        </div>
    </div>

    <!-- СТАТИСТИКА -->
    <div id="page-stats" class="page">
        <div class="card">
            <h3>📊 СТАТИСТИКА</h3>
            <div id="statsContent"></div>
        </div>
    </div>
</div>

<!-- РУЛЕТКА -->
<div id="rouletteModal" style="display:none; position:fixed; top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95); z-index:1000; align-items:center; justify-content:center; flex-direction:column;">
    <h2 style="color:#ff4d4d;">Открытие кейса</h2>
    <div style="width:90%; max-width:600px; height:120px; background:#1e293b; border:2px solid #ff4d4d; border-radius:10px; overflow:hidden;">
        <div id="rouletteContainer" style="display:flex; height:100%; width:max-content; transition:transform 5s cubic-bezier(0.1,0,0.1,1);"></div>
    </div>
    <div id="rouletteResult" style="display:none; margin-top:20px;">
        <h3 id="rouletteItemName"></h3>
        <button class="btn" id="rouletteOkBtn">ОК</button>
    </div>
</div>

<script>
    // ========== GUN ==========
    const gun = Gun(['https://gun-vue.yogg.app/gun', 'https://dletta.pub/gun', 'https://peer.wallie.io/gun']);
    
    // ========== ИГРОВЫЕ ДАННЫЕ ==========
    let game = {
        id: null, nick: "Игрок", gold: 1000, mmr: 0, wins: 0,
        skins: [], usedPromos: [], lastMegaClick: 0,
        weapons: {
            ak47: { name: "AK-47", active: true, skin: null },
            awp: { name: "AWP", active: false, skin: null },
            m4a4: { name: "M4A4", active: false, skin: null }
        }
    };
    
    // ========== ВСТРОЕННЫЕ ПРОМОКОДЫ ==========
    const BUILTIN_PROMOS = {
        "FIX_GAME":   { gold: 500,  skin: "AKR The Elite Fall",              desc: "🔥 ФИКС ИГРЫ!" },
    };
    
    // ========== ФУНКЦИИ ==========
    function generateId() { return '100-' + Math.random().toString(36).substring(2, 10).toUpperCase(); }
    
    function showToast(msg) {
        const t = document.createElement('div');
        t.textContent = msg;
        t.style.cssText = `position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#ff4d4d;color:#fff;font-weight:bold;padding:12px 24px;border-radius:30px;z-index:9999;animation:fadeOut 2s ease;white-space:nowrap;`;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 2000);
    }
    
    function getSkinRarity(name) {
        if (name.includes("Перчатки")) return "rare";
        if (name.includes("Dragon Lore") || name.includes("Karambit")) return "arcane";
        return "common";
    }
    
    function getRankName() {
        if (game.mmr < 100) return "Новичок";
        if (game.mmr < 300) return "Боец";
        if (game.mmr < 600) return "Ветеран";
        if (game.mmr < 1000) return "Элита";
        return "Легенда";
    }
    
    function getAutoGain() {
        const weapon = Object.values(game.weapons).find(w => w.active);
        if (!weapon || !weapon.skin) return 0;
        const r = weapon.skin.rarity;
        if (r === 'common') return 1;
        if (r === 'rare') return 2;
        if (r === 'epic') return 4;
        if (r === 'legendary') return 8;
        if (r === 'arcane') return 15;
        return 0;
    }
    
    function saveGame() {
        if (!game.id) return;
        localStorage.setItem('sc_game_' + game.id, JSON.stringify(game));
        localStorage.setItem('sc_last_id', game.id);
        gun.get('p_' + game.id).put({ id: game.id, nick: game.nick, gold: game.gold, mmr: game.mmr, wins: game.wins, lastSeen: Date.now() });
    }
    
    function loadGame() {
        const savedId = localStorage.getItem('sc_last_id');
        if (savedId) {
            const raw = localStorage.getItem('sc_game_' + savedId);
            if (raw) {
                try {
                    const d = JSON.parse(raw);
                    game.id = d.id || savedId;
                    game.nick = d.nick || "Игрок";
                    game.gold = d.gold ?? 1000;
                    game.mmr = d.mmr ?? 0;
                    game.wins = d.wins ?? 0;
                    game.skins = d.skins || [];
                    game.usedPromos = d.usedPromos || [];
                    game.lastMegaClick = d.lastMegaClick || 0;
                    if (d.weapons) Object.assign(game.weapons, d.weapons);
                } catch(e) {}
            }
        }
        if (!game.id) { game.id = generateId(); saveGame(); }
        
        if (game.skins.length === 0) {
            game.skins.push({ name: "Перчатки (Синие)", rarity: "rare" });
            saveGame();
        }
        
        updateUI();
        updateMegaTimer();
        renderPromos();
    }
    
    function updateUI() {
        document.getElementById('gold').innerHTML = `💰 ${Math.floor(game.gold)} G`;
        document.getElementById('nick').innerHTML = game.nick;
        document.getElementById('rank').innerHTML = `🏅 ${getRankName()} (${game.mmr} MMR)`;
        if (game.id) document.getElementById('playerIdDisplay').innerText = game.id;
        document.getElementById('autoBonus').innerHTML = `🤖 Авто: ${getAutoGain()} G/сек`;
        
        const skinsDiv = document.getElementById('skinsList');
        if (skinsDiv) {
            skinsDiv.innerHTML = game.skins.map((s, i) => `
                <div class="item-card" onclick="equipSkin(${i})">
                    <div style="font-size:28px;">${s.name.includes("Перчатки") ? "🧤" : "🔫"}</div>
                    <div style="font-size:12px; font-weight:bold;">${s.name}</div>
                    <div style="font-size:10px; color:#aaa;">${s.rarity}</div>
                </div>
            `).join('');
        }
        
        renderWeapons();
    }
    
    function renderWeapons() {
        const div = document.getElementById('weaponsList');
        if (div) {
            div.innerHTML = Object.entries(game.weapons).map(([id, w]) => `
                <div class="weapon-card">
                    <b>${w.name}</b> ${w.active ? '✅' : ''}
                    <div style="font-size:12px;">Скин: ${w.skin ? w.skin.name : 'нет'}</div>
                    ${!w.active ? `<button class="btn" style="padding:4px 12px; margin-top:5px;" onclick="equipWeapon('${id}')">Надеть</button>` : ''}
                </div>
            `).join('');
        }
    }
    
    function equipWeapon(weaponId) {
        for (let id in game.weapons) game.weapons[id].active = (id === weaponId);
        saveGame();
        updateUI();
        showToast(`🔫 ${game.weapons[weaponId].name} экипирован`);
    }
    
    function equipSkin(index) {
        const skin = game.skins[index];
        if (!skin) return;
        
        if (skin.name.includes("Перчатки")) {
            showToast(`🧤 ${skin.name} надеты!`);
        } else {
            const active = Object.entries(game.weapons).find(([,w]) => w.active);
            if (active) {
                game.weapons[active[0]].skin = skin;
                saveGame();
                updateUI();
                showToast(`🎨 ${skin.name} надет на ${active[1].name}`);
            }
        }
    }
    
    // ========== ПРОМОКОДЫ (ВСТРОЕННЫЕ) ==========
    function renderPromos() {
        const container = document.getElementById('promoContainer');
        if (!container) return;
        
        const available = [];
        for (const [code, data] of Object.entries(BUILTIN_PROMOS)) {
            if (!game.usedPromos.includes(code)) {
                available.push({ code, ...data });
            }
        }
        
        if (available.length === 0) {
            container.innerHTML = '<div class="card" style="background:#1e293b;">✅ Все промокоды активированы!</div>';
            return;
        }
        
        container.innerHTML = available.map(p => `
            <div class="promo-banner" onclick="claimPromo('${p.code}')">
                <span>🎁 ${p.desc}</span>
                <div style="display:flex; gap:10px; align-items:center;">
                    <span style="font-size:14px;">💰 +${p.gold} G${p.skin ? ` 🎨 +${p.skin}` : ''}</span>
                    <button onclick="event.stopPropagation(); claimPromo('${p.code}')">ЗАБРАТЬ</button>
                </div>
            </div>
        `).join('');
    }
    
    window.claimPromo = function(code) {
        if (game.usedPromos.includes(code)) {
            showToast("Промокод уже активирован!");
            return;
        }
        
        const promo = BUILTIN_PROMOS[code];
        if (!promo) return;
        
        game.gold += promo.gold;
        if (promo.skin) {
            game.skins.push({ name: promo.skin, rarity: getSkinRarity(promo.skin) });
            showToast(`🎁 Получен скин: ${promo.skin}!`);
        }
        game.usedPromos.push(code);
        saveGame();
        updateUI();
        renderPromos();
        showToast(`✅ +${promo.gold} G!`);
        
        document.body.classList.add('mega-flash');
        setTimeout(() => document.body.classList.remove('mega-flash'), 700);
    };
    
    // ========== КЛИКЕР ==========
    document.getElementById('clickBtn').onclick = () => {
        game.gold += 2;
        saveGame();
        updateUI();
    };
    
    function updateMegaTimer() {
        const cooldown = 5 * 60 * 60 * 1000;
        const passed = Date.now() - (game.lastMegaClick || 0);
        const btn = document.getElementById('megaClickBtn');
        const timer = document.getElementById('megaTimer');
        if (passed >= cooldown) {
            btn.disabled = false;
            timer.innerText = "ГОТОВО";
        } else {
            btn.disabled = true;
            const left = cooldown - passed;
            const h = Math.floor(left / 3600000);
            const m = Math.floor((left % 3600000) / 60000);
            const s = Math.floor((left % 60000) / 1000);
            timer.innerText = `${h}:${m<10?'0'+m:m}:${s<10?'0'+s:s}`;
        }
    }
    setInterval(updateMegaTimer, 1000);
    
    document.getElementById('megaClickBtn').onclick = () => {
        if (Date.now() - (game.lastMegaClick || 0) >= 5 * 60 * 60 * 1000) {
            game.gold += 1000;
            game.lastMegaClick = Date.now();
            saveGame();
            updateUI();
            updateMegaTimer();
            document.body.classList.add('mega-flash');
            setTimeout(() => document.body.classList.remove('mega-flash'), 700);
        }
    
    const caseItems = {
        common: ["G22 Scale", "MP5 Small", "M60 Nothing"],
        rare: ["AKR Tiger", "Desert Eagle Cobra"],
        legendary: ["AWM Dragon Lore", "Karambit Gold", "Перчатки (Оранжевые)", "AKR Elite appearance"],
        Mythic: ["AWM Treasure Hunter", "Mallard Gold Pro", "M9 Mimicry", "M4A1 Elite"],
    };
    
    function openCase(price, items, name) {
        if (game.gold < price) { showToast(`Нужно ${price} G!`); return; }
        game.gold -= price;
        saveGame();
        updateUI();
        
        const winIndex = 40;
        const allItems = [...caseItems.common, ...caseItems.rare, ...caseItems.legendary];
        let spin = [];
        for (let i = 0; i < 50; i++) {
            spin.push(i === winIndex ? items[Math.floor(Math.random() * items.length)] : allItems[Math.floor(Math.random() * allItems.length)]);
        }
        const win = spin[winIndex];
        
        const container = document.getElementById('rouletteContainer');
        container.innerHTML = spin.map(s => `<div style="width:120px; display:flex; flex-direction:column; align-items:center; justify-content:center;"><div style="font-size:36px;">${s.includes("Перчатки")?"🧤":"🔫"}</div><div style="font-size:10px;">${s}</div></div>`).join('');
        
        const modal = document.getElementById('rouletteModal');
        modal.style.display = 'flex';
        setTimeout(() => container.style.transform = `translateX(${-(winIndex * 120 + 100)}px)`, 50);
        
        setTimeout(() => {
            document.getElementById('rouletteItemName').innerHTML = `🎉 ${win} 🎉`;
            document.getElementById('rouletteResult').style.display = 'block';
            document.getElementById('rouletteOkBtn').onclick = () => {
                game.skins.push({ name: win, rarity: getSkinRarity(win) });
                saveGame();
                updateUI();
                modal.style.display = 'none';
                document.getElementById('rouletteResult').style.display = 'none';
            };
        }, 5100);
    }
    
    document.getElementById('openCommonCase').onclick = () => openCase(500, caseItems.common, "Обычный");
    document.getElementById('openRareCase').onclick = () => openCase(1500, caseItems.rare, "Редкий");
    document.getElementById('openLegendaryCase').onclick = () => openCase(5000, caseItems.legendary, "Легендарный");
    
    // ========== ОСТАЛЬНОЕ ==========
    function copyPlayerId() { if (game.id) navigator.clipboard.writeText(game.id); showToast("ID скопирован!"); }
    
    document.getElementById('changeNickBtn').onclick = () => {
        const newNick = prompt("Новый ник:", game.nick);
        if (newNick?.trim()) { game.nick = newNick.trim().substring(0, 20); saveGame(); updateUI(); showToast(`Ник изменён`); }
    };
    
    document.getElementById('resetBtn').onclick = () => {
        if (confirm("Сбросить весь прогресс?")) { localStorage.clear(); location.reload(); }
    };
    
    // Навигация
    document.querySelectorAll('.nav-btn').forEach(btn => {
        btn.onclick = () => {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(`page-${btn.dataset.page}`).classList.add('active');
            if (btn.dataset.page === 'stats') {
                document.getElementById('statsContent').innerHTML = `
                    <div>💰 Голда: ${Math.floor(game.gold)} G</div>
                    <div>📊 MMR: ${game.mmr}</div>
                    <div>🏆 Побед: ${game.wins}</div>
                    <div>🎒 Скинов: ${game.skins.length}</div>
                    <div>🎫 Промокодов: ${game.usedPromos.length}/${Object.keys(BUILTIN_PROMOS).length}</div>
                `;
            }
        };
    });
    
    // Автоклик
    setInterval(() => {
        const auto = getAutoGain();
        if (auto > 0) { game.gold += auto; saveGame(); updateUI(); }
    }, 1000);
    
    // ========== ЭПИЧНАЯ 3D ЗАСТАВКА ==========
    let introScene, introCamera, introRenderer, particles;
    
    function initIntro3D() {
        const canvas = document.getElementById('introCanvas');
        const w = window.innerWidth;
        const h = window.innerHeight;
        
        introRenderer = new THREE.WebGLRenderer({ canvas: canvas, alpha: true });
        introRenderer.setSize(w, h);
        introRenderer.setClearColor(0x000000, 1);
        
        introScene = new THREE.Scene();
        introCamera = new THREE.PerspectiveCamera(75, w / h, 0.1, 1000);
        introCamera.position.z = 15;
        
        // Кроваво-красный свет
        const ambientLight = new THREE.AmbientLight(0x330000);
        introScene.add(ambientLight);
        const pointLight = new THREE.PointLight(0xff3333, 1, 30);
        pointLight.position.set(2, 3, 4);
        introScene.add(pointLight);
        const backLight = new THREE.PointLight(0xff0000, 0.5);
        backLight.position.set(-2, -1, -3);
        introScene.add(backLight);
        
        // Парящие кровавые частицы
        const particleCount = 800;
        const particleGeometry = new THREE.BufferGeometry();
        const particlePositions = new Float32Array(particleCount * 3);
        for (let i = 0; i < particleCount; i++) {
            particlePositions[i*3] = (Math.random() - 0.5) * 40;
            particlePositions[i*3+1] = (Math.random() - 0.5) * 30;
            particlePositions[i*3+2] = (Math.random() - 0.5) * 30 - 10;
        }
        particleGeometry.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
        const particleMaterial = new THREE.PointsMaterial({ color: 0xff3333, size: 0.1, transparent: true, opacity: 0.6 });
        particles = new THREE.Points(particleGeometry, particleMaterial);
        introScene.add(particles);
        
        const torusMat = new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: 0x440000, metalness: 0.8, roughness: 0.2 });
        const torus = new THREE.Mesh(new THREE.TorusGeometry(3, 0.3, 64, 200), torusMat);
        introScene.add(torus);
        
        
        const bloodMat = new THREE.MeshStandardMaterial({ color: 0xcc0000, emissive: 0x220000 });
        const bloodDrops = [];
        for (let i = 0; i < 50; i++) {
            const drop = new THREE.Mesh(new THREE.SphereGeometry(0.15, 16, 16), bloodMat);
            drop.userData = {
                x: (Math.random() - 0.5) * 20,
                y: (Math.random() - 0.5) * 15,
                z: (Math.random() - 0.5) * 15 - 5,
                speedX: (Math.random() - 0.5) * 0.02,
                speedY: (Math.random() - 0.5) * 0.02,
                speedZ: (Math.random() - 0.5) * 0.02
            };
            drop.position.set(drop.userData.x, drop.userData.y, drop.userData.z);
            introScene.add(drop);
            bloodDrops.push(drop);
        }
        
        let time = 0;
        
        function animateIntro() {
            requestAnimationFrame(animateIntro);
            time += 0.01;
            
            
            torus.rotation.x += 0.01;
            torus.rotation.y += 0.02;
            torus.rotation.z += 0.005;
            
            
            const intensity = 0.8 + Math.sin(time * 3) * 0.3;
            pointLight.intensity = intensity;
            
            
            particles.rotation.y += 0.002;
            particles.rotation.x += 0.001;
            
            
            bloodDrops.forEach(drop => {
                drop.position.x += drop.userData.speedX;
                drop.position.y += drop.userData.speedY;
                drop.position.z += drop.userData.speedZ;
                if (Math.abs(drop.position.x) > 12) drop.userData.speedX *= -1;
                if (Math.abs(drop.position.y) > 10) drop.userData.speedY *= -1;
                if (Math.abs(drop.position.z) > 12) drop.userData.speedZ *= -1;
            });
            
            introRenderer.render(introScene, introCamera);
        }
        
        animateIntro();
    }
    
    
    initIntro3D();
    
    
    function startApp() {
        const intro = document.getElementById('introScreen');
        intro.querySelector('.intro-content').classList.add('evaporating');
        setTimeout(() => {
            intro.style.display = 'none';
            document.getElementById('mainContainer').style.display = 'block';
        }, 1000);
    }
    
    
    gun.get('server_maintenance').on(data => {
        document.getElementById('maintenanceScreen').style.display = data?.active ? 'flex' : 'none';
    });
    
    
    gun.get('broadcast').on(data => {
        if (data && data.message) showToast(`📢 ${data.message}`);
    });
    
    loadGame();
    
    
    window.startApp = startApp;
    window.equipWeapon = equipWeapon;
    window.equipSkin = equipSkin;
    window.copyPlayerId = copyPlayerId;
    window.claimPromo = claimPromo;
    
    const styleEl = document.createElement('style');
    styleEl.textContent = `@keyframes fadeOut { 0% { opacity: 1; } 70% { opacity: 1; } 100% { opacity: 0; } }`;
    document.head.appendChild(styleEl);
</script>
</body>
</html>
