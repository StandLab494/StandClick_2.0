<meta name='viewport' content='width=device-width, initial-scale=1'/><!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>StandClick — Кликер</title>
    <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body {
            background: linear-gradient(135deg, #0a0a0c, #0f0f1a);
            font-family: 'Segoe UI', system-ui, sans-serif;
            color: white;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 400px; margin: 0 auto; text-align: center; }
        .gold { font-size: 48px; font-weight: bold; color: #ffcc00; margin: 10px 0; }
        .nick { font-size: 18px; color: #aaa; margin: 5px 0; }
        .click-btn {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            background: radial-gradient(#444, #111);
            border: 6px solid #ffcc00;
            margin: 20px auto;
            display: block;
            color: #ffcc00;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }
        .click-btn:active { transform: scale(0.96); }
        .btn {
            background: #ffcc00;
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            margin: 5px;
        }
        .card {
            background: rgba(15,23,42,0.7);
            border-radius: 20px;
            padding: 15px;
            margin: 15px 0;
        }
        .id-box {
            background: rgba(0,0,0,0.4);
            border-radius: 14px;
            padding: 10px;
            margin-top: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }
        .promo-input {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        .promo-input input {
            flex: 1;
            background: #1e293b;
            border: 1px solid #ffcc00;
            padding: 10px;
            border-radius: 30px;
            color: white;
            text-align: center;
        }
        .nav {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .nav-btn {
            background: #1e293b;
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 14px;
        }
        .nav-btn.active {
            background: #ffcc00;
            color: #000;
        }
        .page { display: none; }
        .page.active { display: block; }
        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 10px;
            max-height: 300px;
            overflow-y: auto;
        }
        .item-card {
            background: #1e293b;
            border-radius: 12px;
            padding: 8px;
            text-align: center;
            cursor: pointer;
            border-left: 3px solid #ffcc00;
        }
        .match-log {
            background: #000;
            color: #0f0;
            font-family: monospace;
            padding: 10px;
            border-radius: 10px;
            height: 80px;
            overflow-y: auto;
            font-size: 11px;
            text-align: left;
            margin-top: 10px;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #10b981;
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 13px;
            animation: fadeOut 2s ease;
            z-index: 1000;
        }
        @keyframes fadeOut {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="nav">
        <button class="nav-btn active" data-page="main">🎯 Главная</button>
        <button class="nav-btn" data-page="match">⚔️ Матчи</button>
        <button class="nav-btn" data-page="shop">🎁 Кейсы</button>
        <button class="nav-btn" data-page="inventory">📦 Инвентарь</button>
        <button class="nav-btn" data-page="promo">🔑 Промокоды</button>
    </div>

    <!-- Главная -->
    <div id="page-main" class="page active">
        <div class="gold" id="gold">0 G</div>
        <div class="nick" id="nick">Игрок</div>
        <div class="nick" id="rank">Silver I</div>
        <button class="click-btn" id="clickBtn">CLICK</button>
        <div class="id-box">
            <span>🆔 ID:</span>
            <span id="playerIdDisplay">—</span>
            <button class="btn" style="padding:5px 12px;margin:0;font-size:12px;" onclick="copyPlayerId()">📋</button>
        </div>
        <div style="margin-top:10px;">
            <button class="btn" id="changeNickBtn">✏️ Сменить ник</button>
            <button class="btn btn-danger" id="resetBtn" style="background:#dc2626;">🔄 Сброс</button>
        </div>
    </div>

    <!-- Матчи -->
    <div id="page-match" class="page">
        <div class="card">
            <button class="btn" id="findMatchBtn">🔍 НАЙТИ МАТЧ</button>
            <div class="match-log" id="matchLog">> Ожидание...</div>
        </div>
        <div class="card">
            <div>🏆 Побед: <span id="wins">0</span></div>
            <div>📊 MMR: <span id="mmr">0</span></div>
        </div>
    </div>

    <!-- Кейсы -->
    <div id="page-shop" class="page">
        <div class="card"><h3>📦 Обычный кейс</h3><p>500 G</p><button class="btn" id="openCommonCase">Открыть</button></div>
        <div class="card"><h3>🔥 Редкий кейс</h3><p>1500 G</p><button class="btn" id="openRareCase">Открыть</button></div>
        <div class="card"><h3>💎 Легендарный кейс</h3><p>5000 G</p><button class="btn" id="openLegendaryCase">Открыть</button></div>
    </div>

    <!-- Инвентарь -->
    <div id="page-inventory" class="page">
        <div class="card"><h3>🎨 МОИ СКИНЫ</h3><div id="skinsList" class="items-grid"></div></div>
    </div>

    <!-- Промокоды -->
    <div id="page-promo" class="page">
        <div class="card">
            <h3>🔑 Промокод</h3>
            <div class="promo-input">
                <input type="text" id="promoCodeInput" placeholder="Введите промокод">
                <button class="btn" id="activatePromoBtn">Активировать</button>
            </div>
        </div>
    </div>
</div>

<script>
    // ========== GUN ==========
    const gun = Gun(['https://gun-vue.yogg.app/gun', 'https://dletta.pub/gun']);
    const db = gun.get('standclick_v2');

    // ========== ПРОМОКОДЫ (ОБЩИЕ ЧЕРЕЗ GUN) ==========
    const promosDb = gun.get('standclick_promos');

    // ========== ДАННЫЕ ==========
    let game = {
        id: null,
        nick: "Игрок",
        gold: 1000,
        mmr: 0,
        wins: 0,
        skins: [],
        usedPromos: []
    };

    const commonSkins = ["G22 Frost", "MP5 Swarm", "SSG 08 Abyss"];
    const rareSkins = ["AKM Tiger", "Desert Eagle Cobra", "M4A4 Griffin"];
    const legendarySkins = ["AWP Dragon Lore", "Karambit Fade", "M9 Bayonet"];

    // ========== ФУНКЦИИ ==========
    function generateId() { return 'ST2-' + Math.random().toString(36).substring(2, 10).toUpperCase(); }

    function getRankName() {
        if (game.mmr >= 5000) return "Global Elite";
        if (game.mmr >= 3000) return "Legendary Eagle";
        if (game.mmr >= 1500) return "Master Guardian";
        if (game.mmr >= 500) return "Gold Nova";
        return "Silver I";
    }

    function saveGame() {
        localStorage.setItem('standclick_player', JSON.stringify(game));
    }

    function loadGame() {
        const savedId = localStorage.getItem('standclick_lastId');
        if (savedId) {
            const raw = localStorage.getItem('standclick_player_' + savedId);
            if (raw) {
                try {
                    const d = JSON.parse(raw);
                    game.id = d.id;
                    game.nick = d.nick || "Игрок";
                    game.gold = d.gold ?? 1000;
                    game.mmr = d.mmr ?? 0;
                    game.wins = d.wins ?? 0;
                    game.skins = d.skins || [];
                    game.usedPromos = d.usedPromos || [];
                } catch(e) {}
            }
        }
        if (!game.id) {
            game.id = generateId();
            saveGame();
            localStorage.setItem('standclick_lastId', game.id);
        }
        updateUI();
    }

    function updateUI() {
        document.getElementById('gold').innerText = Math.floor(game.gold) + " G";
        document.getElementById('nick').innerText = game.nick;
        document.getElementById('wins').innerText = game.wins;
        document.getElementById('mmr').innerText = game.mmr;
        document.getElementById('rank').innerHTML = getRankName();
        document.getElementById('playerIdDisplay').innerText = game.id;
        
        document.getElementById('skinsList').innerHTML = game.skins.map((s, i) => `
            <div class="item-card">
                <div>🎨 ${s}</div>
            </div>
        `).join('');
    }

    async function activatePromo() {
        const code = document.getElementById('promoCodeInput').value.trim().toUpperCase();
        if (!code) { showToast("❌ Введите код"); return; }
        if (game.usedPromos.includes(code)) { showToast("❌ Вы уже использовали этот промокод!"); return; }
        
        // Ищем промокод в Gun
        promosDb.get(code).once((data) => {
            if (!data || data.usesLeft <= 0) {
                showToast("❌ Неверный или использованный промокод!");
                return;
            }
            
            // Активируем
            data.usesLeft--;
            promosDb.get(code).put(data);
            
            game.usedPromos.push(code);
            game.gold += data.gold;
            if (data.skin) game.skins.push(data.skin);
            saveGame();
            updateUI();
            showToast(`✅ +${data.gold} G!`);
            document.getElementById('promoCodeInput').value = '';
        });
    }

    function openCase(price, skins, caseName) {
        if (game.gold < price) { showToast(`❌ Нужно ${price} G`); return; }
        game.gold -= price;
        const randomSkin = skins[Math.floor(Math.random() * skins.length)];
        game.skins.push(randomSkin);
        saveGame();
        updateUI();
        showToast(`🎁 ${caseName} | Выпало: ${randomSkin}!`);
    }

    function startMatch() {
        const win = Math.random() > 0.48;
        const mmrChange = Math.floor(Math.random() * 15) + 5;
        if (win) {
            game.mmr += mmrChange;
            game.wins++;
            showToast(`🏆 ПОБЕДА! +${mmrChange} MMR`);
        } else {
            game.mmr = Math.max(0, game.mmr - mmrChange);
            showToast(`💔 ПОРАЖЕНИЕ! -${mmrChange} MMR`);
        }
        saveGame();
        updateUI();
    }

    function showToast(msg) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }

    function copyPlayerId() {
        navigator.clipboard.writeText(game.id);
        showToast("🆔 ID скопирован!");
    }

    // ========== СОБЫТИЯ ==========
    document.querySelectorAll('.nav-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(`page-${btn.dataset.page}`).classList.add('active');
        });
    });

    document.getElementById('clickBtn').onclick = () => {
        game.gold++;
        saveGame();
        updateUI();
    };

    document.getElementById('findMatchBtn').onclick = () => {
        const btn = document.getElementById('findMatchBtn');
        const log = document.getElementById('matchLog');
        btn.disabled = true;
        log.innerHTML = "> Поиск игроков...\n";
        setTimeout(() => {
            log.innerHTML += "> Матч начался!\n";
            setTimeout(() => {
                startMatch();
                btn.disabled = false;
                log.innerHTML += "> Матч завершён!\n";
            }, 2000);
        }, 1000);
    };

    document.getElementById('openCommonCase').onclick = () => openCase(500, commonSkins, "📦 Обычный кейс");
    document.getElementById('openRareCase').onclick = () => openCase(1500, rareSkins, "🔥 Редкий кейс");
    document.getElementById('openLegendaryCase').onclick = () => openCase(5000, legendarySkins, "💎 Легендарный кейс");

    document.getElementById('changeNickBtn').onclick = () => {
        const newNick = prompt("Новый ник:", game.nick);
        if (newNick && newNick.trim()) {
            game.nick = newNick.trim();
            saveGame();
            updateUI();
        }
    };

    document.getElementById('resetBtn').onclick = () => {
        if (confirm("Сбросить прогресс?")) {
            localStorage.clear();
            location.reload();
        }
    };

    document.getElementById('activatePromoBtn').onclick = activatePromo;

    loadGame();
    setInterval(() => saveGame(), 30000);
</script>
</body>
</html>
