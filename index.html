<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>StandClick — С ботами и онлайн</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #0a0a0c, #0f0f1a);
            font-family: 'Segoe UI', system-ui, sans-serif;
            color: white;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 450px;
            margin: 0 auto;
            text-align: center;
        }

        .gold {
            font-size: 48px;
            font-weight: bold;
            color: #ffcc00;
            margin: 10px 0;
        }

        .nick {
            font-size: 18px;
            color: #aaa;
            margin: 5px 0;
        }

        .online-counter {
            background: rgba(0,0,0,0.5);
            border-radius: 30px;
            padding: 6px 16px;
            display: inline-block;
            margin-bottom: 15px;
            font-size: 13px;
            font-weight: bold;
        }

        .click-btn {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            background: radial-gradient(#444, #111);
            border: 6px solid #ffcc00;
            margin: 20px auto;
            display: block;
            color: #ffcc00;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }

        .click-btn:active {
            transform: scale(0.96);
        }

        .btn {
            background: #ffcc00;
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            margin: 5px;
        }

        .btn-danger {
            background: #dc2626;
            color: white;
        }

        .card {
            background: rgba(15, 23, 42, 0.7);
            border-radius: 20px;
            padding: 15px;
            margin: 15px 0;
        }

        .chat-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 300px;
            background: #1a1a22;
            border-radius: 16px;
            border: 1px solid #ffcc00;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
        }

        .chat-header {
            background: #ffcc00;
            color: #000;
            padding: 10px 14px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            cursor: pointer;
        }

        .chat-messages {
            height: 280px;
            overflow-y: auto;
            padding: 10px;
            font-size: 12px;
            background: #0f0f14;
        }

        .chat-input-area {
            display: flex;
            padding: 10px;
            gap: 8px;
            background: #252530;
        }

        .chat-input-area input {
            flex: 1;
            padding: 10px;
            border-radius: 20px;
            border: none;
            background: #1a1a22;
            color: white;
        }

        .chat-input-area button {
            background: #ffcc00;
            border: none;
            border-radius: 20px;
            padding: 8px 16px;
            cursor: pointer;
            font-weight: bold;
        }

        .message {
            margin: 6px 0;
            word-break: break-word;
            line-height: 1.4;
        }

        .message-user {
            color: #ffcc00;
            font-weight: bold;
        }

        .message-bot {
            color: #00ffaa;
            font-weight: bold;
        }

        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: #10b981;
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 13px;
            animation: fadeOut 2s ease;
            z-index: 2000;
        }

        @keyframes fadeOut {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }

        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 10px;
            max-height: 300px;
            overflow-y: auto;
        }

        .item-card {
            background: #1e293b;
            border-radius: 12px;
            padding: 8px;
            text-align: center;
            border-left: 3px solid #ffcc00;
        }

        .id-box {
            background: rgba(0,0,0,0.4);
            border-radius: 14px;
            padding: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            gap: 8px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="online-counter" id="onlineCounter">🟢 Подключение...</div>
    <div class="gold" id="gold">0 G</div>
    <div class="nick" id="nick">Игрок</div>
    <div class="nick" id="rank">Silver I</div>
    <button class="click-btn" id="clickBtn">CLICK</button>

    <div class="card">
        <h3>💰 КЕЙСЫ</h3>
        <button class="btn" id="openCommonCase">📦 Обычный (500 G)</button>
        <button class="btn" id="openRareCase">🔥 Редкий (1500 G)</button>
        <button class="btn" id="openLegendaryCase">💎 Легендарный (5000 G)</button>
    </div>

    <div class="card">
        <h3>🎨 ИНВЕНТАРЬ</h3>
        <div id="inventory" class="items-grid"></div>
    </div>

    <div class="card">
        <div class="id-box">
            <span>🆔 ID:</span>
            <span id="playerId">—</span>
            <button class="btn" style="padding:5px 12px;margin:0;" onclick="copyPlayerId()">📋</button>
        </div>
        <button class="btn" id="changeNickBtn">✏️ Сменить ник</button>
        <button class="btn btn-danger" id="resetBtn">🔄 Сброс</button>
    </div>
</div>

<!-- Чат -->
<div class="chat-container" id="chatContainer">
    <div class="chat-header">
        <span>💬 ОБЩИЙ ЧАТ</span>
        <span id="chatClose" style="cursor:pointer;">✖</span>
    </div>
    <div class="chat-messages" id="chatMessages">
        <div class="message"><span class="message-bot">🟢 Система</span>: Добро пожаловать в чат!</div>
    </div>
    <div class="chat-input-area">
        <input type="text" id="chatInput" placeholder="Написать сообщение...">
        <button id="chatSendBtn">➤</button>
    </div>
</div>

<script>
    // ========== ФЕЙК-ОНЛАЙН ==========
    let onlineCount = 12;
    const botNames = [
        "KILLER_228", "Xx_Standoff_xX", "NoobMaster69", "PRO100_SNIPER",
        "Creeper_1337", "M4A4_King", "AWP_God", "Ghost_Rusher",
        "Dimasik_Pro", "Messi_10", "Zloy_Shadow", "Legendary_Peak",
        "S1mpleUA", "ZywOo_Fan", "CS2_Player", "B1t_Pro"
    ];
    
    const botMessages = [
        "харош, зашел на пару мин", "кто в пати?", "дайте нож в трейд(",
        "ага, ща, кейс открыл - мусор", "лвл какой?", "гоню на миде",
        "кто за меня зарегает?", "суета", "есть с кем сыграть?",
        "топ скин какой выпадал?", "кулдаун на матч 2 мин?", "фармим дальше",
        "хай всем", "кто хочет в дуэль?", "продам акк с легендаркой",
        "давай в пати", "+rep", "с кем поиграть?", "новичок, помогите",
        "топ 5 по голде кто?", "а где админ?", "имба кейс выпал"
    ];
    
    const botAnswers = [
        "согласен", "хах", "реально", "не, ну такое", "ага, сейчас",
        "👍", "жиза", "кек", "база", "норм тема", "😎", "🔥🔥🔥",
        "погнали", "давай", "+1", "лол", "😂", "круто", "имба"
    ];

    function updateOnlineCounter() {
        const change = Math.floor(Math.random() * 9) - 4;
        onlineCount = Math.max(5, Math.min(99, onlineCount + change));
        const randomTop = botNames[Math.floor(Math.random() * botNames.length)];
        const randomMMR = Math.floor(Math.random() * 3000) + 1000;
        document.getElementById('onlineCounter').innerHTML = `🟢 ${onlineCount} игроков онлайн | 🔥 Лучший: ${randomTop} (${randomMMR} MMR)`;
    }

    setInterval(updateOnlineCounter, 12000);
    updateOnlineCounter();

    // ========== ЧАТ С БОТАМИ ==========
    let lastBotMessage = 0;
    
    function addChatMessage(name, text, isUser = false, isBot = false) {
        const container = document.getElementById('chatMessages');
        const msg = document.createElement('div');
        msg.className = 'message';
        if (isUser) {
            msg.innerHTML = `<span class="message-user">${name}:</span> ${text}`;
        } else if (isBot) {
            msg.innerHTML = `<span class="message-bot">🤖 ${name}:</span> ${text}`;
        } else {
            msg.innerHTML = `<span class="message-bot">${name}:</span> ${text}`;
        }
        container.appendChild(msg);
        container.scrollTop = container.scrollHeight;
        
        while (container.children.length > 150) {
            container.removeChild(container.firstChild);
        }
    }

    function botSendMessage() {
        const randomBot = botNames[Math.floor(Math.random() * botNames.length)];
        const randomMsg = botMessages[Math.floor(Math.random() * botMessages.length)];
        addChatMessage(randomBot, randomMsg, false, true);
    }

    function botReplyToPlayer(playerName, playerMsg) {
        setTimeout(() => {
            // 60% шанс что бот ответит
            if (Math.random() > 0.4) {
                const randomBot = botNames[Math.floor(Math.random() * botNames.length)];
                let reply = "";
                
                // Интеллектуальный ответ (простой)
                if (playerMsg.includes("?") || playerMsg.includes("кто") || playerMsg.includes("что") || playerMsg.includes("где")) {
                    const answers = ["не знаю", "спроси у админа", "хз", "👀", "возможно", "наверное"];
                    reply = answers[Math.floor(Math.random() * answers.length)];
                } else if (playerMsg.toLowerCase().includes("привет") || playerMsg.toLowerCase().includes("здарова")) {
                    reply = "привет!";
                } else if (playerMsg.toLowerCase().includes("как дела")) {
                    reply = "норм, фармлю";
                } else {
                    reply = botAnswers[Math.floor(Math.random() * botAnswers.length)];
                }
                addChatMessage(randomBot, reply, false, true);
            }
        }, 1500 + Math.random() * 3000);
    }

    // Боты пишут каждые 20-45 секунд
    setInterval(() => {
        botSendMessage();
    }, 25000);
    
    // Первые сообщения при загрузке
    setTimeout(() => {
        botSendMessage();
    }, 3000);
    setTimeout(() => {
        botSendMessage();
    }, 10000);

    // ========== ДАННЫЕ ==========
    let game = {
        id: null,
        nick: "Игрок",
        gold: 1000,
        mmr: 0,
        wins: 0,
        skins: []
    };

    const commonSkins = ["G22 Frost", "MP5 Swarm", "SSG 08 Abyss", "FAMAS Roller"];
    const rareSkins = ["AKM Tiger", "Desert Eagle Cobra", "M4A4 Griffin"];
    const legendarySkins = ["AWP Dragon Lore", "Karambit Fade", "M9 Bayonet"];

    function generateId() {
        return 'ST2-' + Math.random().toString(36).substring(2, 10).toUpperCase();
    }

    function saveGame() {
        localStorage.setItem('standclick_game', JSON.stringify({
            id: game.id,
            nick: game.nick,
            gold: game.gold,
            mmr: game.mmr,
            wins: game.wins,
            skins: game.skins
        }));
    }

    function loadGame() {
        const saved = localStorage.getItem('standclick_game');
        if (saved) {
            try {
                const data = JSON.parse(saved);
                game.id = data.id;
                game.nick = data.nick || "Игрок";
                game.gold = data.gold ?? 1000;
                game.mmr = data.mmr ?? 0;
                game.wins = data.wins ?? 0;
                game.skins = data.skins || [];
            } catch(e) {}
        }
        if (!game.id) {
            game.id = generateId();
            saveGame();
        }
        updateUI();
    }

    function getRankName() {
        if (game.mmr >= 5000) return "Global Elite";
        if (game.mmr >= 3000) return "Legendary Eagle";
        if (game.mmr >= 1500) return "Master Guardian";
        if (game.mmr >= 500) return "Gold Nova";
        return "Silver I";
    }

    function updateUI() {
        document.getElementById('gold').innerText = Math.floor(game.gold) + " G";
        document.getElementById('nick').innerText = game.nick;
        document.getElementById('playerId').innerText = game.id;
        document.getElementById('rank').innerHTML = getRankName();
        
        const invContainer = document.getElementById('inventory');
        if (game.skins.length === 0) {
            invContainer.innerHTML = '<div style="color:#666;">Нет скинов</div>';
        } else {
            invContainer.innerHTML = game.skins.map(s => `
                <div class="item-card">🎨 ${s}</div>
            `).join('');
        }
    }

    function openCase(price, skins, caseName) {
        if (game.gold < price) {
            showToast(`❌ Нужно ${price} G`);
            return;
        }
        game.gold -= price;
        const randomSkin = skins[Math.floor(Math.random() * skins.length)];
        game.skins.push(randomSkin);
        saveGame();
        updateUI();
        showToast(`🎁 ${caseName} | Выпало: ${randomSkin}!`);
    }

    function showToast(msg) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }

    function copyPlayerId() {
        navigator.clipboard.writeText(game.id);
        showToast("🆔 ID скопирован!");
    }

    // ========== ОТПРАВКА СООБЩЕНИЯ В ЧАТ ==========
    function sendChatMessage() {
        const input = document.getElementById('chatInput');
        const text = input.value.trim();
        if (!text) return;
        
        addChatMessage(game.nick, text, true, false);
        botReplyToPlayer(game.nick, text);
        input.value = '';
    }

    // ========== СОБЫТИЯ ==========
    document.getElementById('clickBtn').onclick = () => {
        game.gold++;
        saveGame();
        updateUI();
    };

    document.getElementById('openCommonCase').onclick = () => openCase(500, commonSkins, "📦 Обычный кейс");
    document.getElementById('openRareCase').onclick = () => openCase(1500, rareSkins, "🔥 Редкий кейс");
    document.getElementById('openLegendaryCase').onclick = () => openCase(5000, legendarySkins, "💎 Легендарный кейс");

    document.getElementById('changeNickBtn').onclick = () => {
        const newNick = prompt("Новый ник:", game.nick);
        if (newNick && newNick.trim()) {
            game.nick = newNick.trim();
            saveGame();
            updateUI();
            showToast(`✅ Ник изменён на ${game.nick}`);
        }
    };

    document.getElementById('resetBtn').onclick = () => {
        if (confirm("Сбросить весь прогресс?")) {
            localStorage.removeItem('standclick_game');
            location.reload();
        }
    };

    document.getElementById('chatSendBtn').onclick = sendChatMessage;
    document.getElementById('chatInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendChatMessage();
    });
    
    let chatOpen = true;
    document.getElementById('chatClose').onclick = () => {
        const container = document.getElementById('chatContainer');
        chatOpen = !chatOpen;
        container.style.display = chatOpen ? 'flex' : 'none';
    };

    loadGame();
    setInterval(() => saveGame(), 30000);
</script>
</body>
</html>
